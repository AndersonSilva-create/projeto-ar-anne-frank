<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>
        Anexo Secreto VR
    </title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ====================================== -->
    <!-- HUD -->
    <!-- ====================================== -->

    <div id="hud">

        <div id="hud-message">

            Explore o Anexo Secreto

        </div>

        <button id="toggle-light">

            Modo Noite

        </button>

        <button id="open-qr">

            Jogar no Celular / Modo AR

        </button>

    </div>

    <!-- ====================================== -->
    <!-- FADE DE TRANSIÇÃO -->
    <!-- ====================================== -->

    <div id="fade-screen"></div>

    <!-- ====================================== -->
    <!-- DIÁRIO -->
    <!-- ====================================== -->

    <div id="diary-modal">

        <div id="diary-paper">

            <h2 id="diary-date"></h2>

            <p id="diary-content"></p>

            <div class="diary-controls">

                <button id="prev-page">

                    Anterior

                </button>

                <span id="page-counter">

                    Pág. 1 / 5

                </span>

                <button id="next-page">

                    Próximo

                </button>

            </div>

            <button id="close-diary">

                Fechar

            </button>

        </div>

    </div>

    <!-- ====================================== -->
    <!-- QR CODE -->
    <!-- ====================================== -->

    <div id="qr-modal">

        <div id="qr-container">

            <h3>

                Abrir no Celular

            </h3>

            <img id="qr-image" alt="QR Code">

            <button id="close-qr">

                Fechar

            </button>

        </div>

    </div>

    <!-- ====================================== -->
    <!-- FALA DA ANNE -->
    <!-- ====================================== -->

    <div id="anne-dialog">

    </div>

    <!-- ====================================== -->
    <!-- INSPEÇÃO DE OBJETO -->
    <!-- ====================================== -->

    <div id="inspect-panel">

        <h3 id="inspect-title"></h3>

        <p id="inspect-text"></p>

        <button id="inspect-close">

            Voltar

        </button>

    </div>
    <!-- ====================================== -->
    <!-- CENA A-FRAME -->
    <!-- ====================================== -->

    <a-scene renderer="
antialias:true;
colorManagement:true;
physicallyCorrectLights:true" xr-mode-ui="enabled:true" background="color:#1b1b1b">

        <!-- ====================================== -->
        <!-- ASSETS -->
        <!-- ====================================== -->

        <a-assets>

            <img id="tex-biblioteca" src="assets/biblioteca_parede.jpg">

            <img id="tex-quarto" src="assets/quarto_parede.jpg">

            <img id="tex-andar1" src="assets/andar1_parede.jpg">

            <img id="tex-sotao" src="assets/sotao_parede.jpg">

            <img id="tex-vista" src="assets/vista_rua.jpg">

            <img id="tex-anne-vestido" src="assets/anne_vestido.jpg">

            <img id="tex-anne-rosto" src="assets/anne_rosto.jpg">

            <img id="tex-anne-cabelo" src="assets/anne_cabelo.jpg">

            <audio id="audio-anne" src="assets/anne_narracao.mp3" preload="auto"></audio>

        </a-assets>

        <!-- ====================================== -->
        <!-- ILUMINAÇÃO -->
        <!-- ====================================== -->

        <a-entity id="light-rig">

            <a-light id="ambient-light" type="ambient" intensity="0.35" color="#bfc9d4">

            </a-light>

            <a-light id="sun-light" type="directional" position="5 8 2" rotation="-45 -20 0" intensity="1.2"
                color="#fff1c2">

            </a-light>

        </a-entity>

        <!-- ====================================== -->
        <!-- CAMERA RIG -->
        <!-- ====================================== -->

        <a-entity id="camera-rig" position="0 1.6 0" motor-colisao>

            <a-entity camera id="visao-usuario" look-controls="
magicWindowTrackingEnabled:true;
touchEnabled:true" wasd-controls="
acceleration:25">

                <a-cursor raycaster="
objects:.interactable" color="#ffffff" scale="0.5 0.5 0.5" animation__fusing="
property:scale;
startEvents:fusing;
dur:1500;
from:0.5 0.5 0.5;
to:0.1 0.1 0.1" animation__mouseleave="
property:scale;
startEvents:mouseleave;
dur:500;
to:0.5 0.5 0.5">

                </a-cursor>

            </a-entity>

        </a-entity>


        <!-- ====================================== -->
        <!-- Sistema Descer escadas -->
        <!-- ====================================== -->

        <a-box id="descer-andar1" class="interactable" visible="true" material="transparent:true; opacity:0" position="-2.3 5.4 -4.5" width="1.0" height="1.2"
            depth="1.0">

        </a-box>


        <!--    Parte 2-->
        <a-box id="descer-sotao" class="interactable" visible="true" material="transparent:true; opacity:0" position="2.3 9.4 -4.5" width="1.0" height="1.2"
            depth="1.0">

        </a-box>



        <!-- ====================================== -->
        <!-- TÉRREO - BIBLIOTECA -->
        <!-- ====================================== -->

        <a-plane src="#tex-biblioteca" position="0 2 2" rotation="0 180 0" width="6" height="4" material="side:double">

        </a-plane>

        <a-plane rotation="-90 0 0" position="0 0 0" width="6" height="4" color="#6b5846">

        </a-plane>

        <!-- parede frontal -->

        <a-plane src="#tex-biblioteca" position="0 2 2" width="6" height="4">

        </a-plane>

        <!-- parede esquerda -->

        <a-plane src="#tex-biblioteca" rotation="0 90 0" position="-3 2 0" width="4" height="4">

        </a-plane>

        <!-- parede direita -->

        <a-plane src="#tex-biblioteca" rotation="0 -90 0" position="3 2 0" width="4" height="4">

        </a-plane>

        <!-- teto -->

        <a-plane rotation="90 0 0" position="0 4 -4" width="6" height="12" color="#6f4b2d" material="side:double">

        </a-plane>

        <!-- ====================================== -->
        <!-- DIVISÓRIA DA PASSAGEM SECRETA -->
        <!-- ====================================== -->

        <a-box position="-2 2 -2" depth="0.2" height="4" width="2" src="#tex-biblioteca">

        </a-box>

        <a-box position="2 2 -2" depth="0.2" height="4" width="2" src="#tex-biblioteca">

        </a-box>

        <!-- ====================================== -->
        <!-- ESTANTE SECRETA -->
        <!-- ====================================== -->

        <a-box id="estante-secreta" class="interactable" position="0 1.5 -1.9" scale="1.9 3 0.4" color="#5f4025">

        </a-box>

        <!-- ====================================== -->
        <!-- QUARTO PRINCIPAL -->
        <!-- ====================================== -->

        <!-- piso -->

        <a-plane rotation="-90 0 0" position="0 0 -6" width="6" height="8" color="#745e4b">

        </a-plane>

        <!-- parede fundo -->

        <a-plane src="#tex-quarto" position="0 2 -10" width="6" height="4">

        </a-plane>

        <!-- parede esquerda -->

        <a-plane src="#tex-quarto" rotation="0 90 0" position="-3 2 -6" width="8" height="4">

        </a-plane>

        <!-- parede direita -->

        <a-plane src="#tex-quarto" rotation="0 -90 0" position="3 2 -6" width="8" height="4">

        </a-plane>

        <!-- Teto -->

        <a-plane rotation="90 0 0" position="0 4 -6" width="6" height="8" material="
src:#tex-quarto;
side:double;
repeat:2 2">

        </a-plane>>

        <!-- ====================================== -->
        <!-- MESA DO DIÁRIO -->
        <!-- ====================================== -->

        <a-entity id="mesa-diario">

            <!-- tampo -->

            <a-box position="0 0.75 -6.5" width="1.4" height="0.08" depth="0.8" color="#6b4a2f">

            </a-box>

            <!-- pernas -->

            <a-cylinder position="-0.55 0.35 -6.15" radius="0.04" height="0.7" color="#5a3b24">

            </a-cylinder>

            <a-cylinder position="0.55 0.35 -6.15" radius="0.04" height="0.7" color="#5a3b24">

            </a-cylinder>

            <a-cylinder position="-0.55 0.35 -6.85" radius="0.04" height="0.7" color="#5a3b24">

            </a-cylinder>

            <a-cylinder position="0.55 0.35 -6.85" radius="0.04" height="0.7" color="#5a3b24">

            </a-cylinder>

        </a-entity>

        <!-- ====================================== -->
        <!-- DIÁRIO -->
        <!-- ====================================== -->

        <a-box id="objeto-diario" class="interactable" position="0 0.84 -6.5" width="0.4" height="0.06" depth="0.5"
            color="#a81e1e">

        </a-box>

        <!-- ====================================== -->
        <!-- ARMÁRIO -->
        <!-- ====================================== -->

        <a-box id="armario" position="-2.7 1.2 -8.5" width="0.5" height="2.4" depth="1" color="#4c3420">

        </a-box>

        <!-- ====================================== -->
        <!-- ESCADA 1 -->
        <!-- ====================================== -->

        <a-entity id="escada-1" position="-2.3 0 -4.5">

            <!-- montante esquerdo -->

            <a-cylinder radius="0.03" height="4.8" position="-0.25 2.4 0" color="#8c6239">

            </a-cylinder>

            <!-- montante direito -->

            <a-cylinder radius="0.03" height="4.8" position="0.25 2.4 0" color="#8c6239">

            </a-cylinder>

            <!-- degraus -->

            <a-box position="0 0.5 0" width="0.55" height="0.03" depth="0.08" color="#b78b58"></a-box>
            <a-box position="0 1.0 0" width="0.55" height="0.03" depth="0.08" color="#b78b58"></a-box>
            <a-box position="0 1.5 0" width="0.55" height="0.03" depth="0.08" color="#b78b58"></a-box>
            <a-box position="0 2.0 0" width="0.55" height="0.03" depth="0.08" color="#b78b58"></a-box>
            <a-box position="0 2.5 0" width="0.55" height="0.03" depth="0.08" color="#b78b58"></a-box>
            <a-box position="0 3.0 0" width="0.55" height="0.03" depth="0.08" color="#b78b58"></a-box>

        </a-entity>

        <!-- gatilho subir -->

        <a-box id="subir-andar1" class="interactable" visible="true" material="transparent:true; opacity:0" position="-2.3 1.6 -4.5" width="1.0" height="3.2"
            depth="1.0">

        </a-box>

        <!-- ====================================== -->
        <!-- PISO SEGUNDO ANDAR -->
        <!-- COM VÃO REAL DA ESCADA 1 -->
        <!-- ====================================== -->

        <!-- lado esquerdo -->

        <a-plane rotation="-90 0 0" position="-1.7 4.01 -6" width="2.6" height="8" color="#6f5b48">

        </a-plane>

        <!-- lado direito -->

        <a-plane rotation="-90 0 0" position="1.3 4.01 -6" width="3.4" height="8" color="#6f5b48">

        </a-plane>

        <!-- frente do vão -->

        <a-plane rotation="-90 0 0" position="-2.3 4.01 -2.9" width="0.8" height="1.4" color="#6f5b48">

        </a-plane>

        <!-- trás do vão -->

        <a-plane rotation="-90 0 0" position="-2.3 4.01 -5.9" width="0.8" height="4.2" color="#6f5b48">

        </a-plane>

        <!-- resultado:
vão aberto em:
X=-2.3
Z=-4.5 -->

        <!-- ====================================== -->
        <!-- SEGUNDO ANDAR -->
        <!-- ====================================== -->

        <!-- Correção paredes faltando -->

        <a-plane src="#tex-andar1" position="0 6 -2" rotation="0 180 0" width="6" height="4" material="side:double">

        </a-plane>

        <!-- parede frontal -->

        <a-plane src="#tex-andar1" position="0 6 2" width="6" height="4">

        </a-plane>

        <!-- parede esquerda -->

        <a-plane src="#tex-andar1" rotation="0 90 0" position="-3 6 -6" width="8" height="4">

        </a-plane>

        <!-- parede direita -->

        <a-plane src="#tex-andar1" rotation="0 -90 0" position="3 6 -6" width="8" height="4">

        </a-plane>

        <!-- parede traseira esquerda -->

        <a-plane src="#tex-andar1" position="-1.2 6 -10" width="3.6" height="4">

        </a-plane>

        <!-- parede traseira direita -->

        <a-plane src="#tex-andar1" position="1.8 6 -10" width="2.4" height="4">

        </a-plane>

        <!-- teto do segundo andar -->

        <a-plane rotation="90 0 0" position="0 8 -4" width="6" height="12" color="#7a4c2d" material="side:double">

        </a-plane>

        <!-- ====================================== -->
        <!-- JANELA DA ESPERANÇA -->
        <!-- ====================================== -->

        <a-plane id="janela-vista" src="#tex-vista" position="2.95 6 -6" rotation="0 -90 0" width="2" height="1.6">

        </a-plane>

        <!-- moldura -->

        <a-box position="2.9 6 -6" width="0.05" height="2" depth="2.2" color="#5b3f28">

        </a-box>

        <!-- ====================================== -->
        <!-- CAMA -->
        <!-- ====================================== -->

        <a-entity id="cama">

            <!-- base -->

            <a-box position="0.8 4.35 -8.9" width="1.8" height="0.25" depth="0.9" color="#73543b">

            </a-box>

            <!-- colchão -->

            <a-box position="0.8 4.55 -8.9" width="1.7" height="0.18" depth="0.8" color="#d7d2ca">

            </a-box>

            <!-- travesseiro -->

            <a-box position="0.2 4.68 -8.9" width="0.45" height="0.12" depth="0.4" color="#efefef">

            </a-box>

        </a-entity>

        <!-- ====================================== -->
        <!-- ANNE FRANK LOW POLY -->
        <!-- ====================================== -->

        <a-entity id="anne-frank-3d" class="interactable" position="0.8 4.65 -8.9">

            <!-- tronco -->

            <a-box src="#tex-anne-vestido" width="0.45" height="0.7" depth="0.25" position="0 0.35 0">

            </a-box>

            <!-- cabeça -->

            <a-sphere src="#tex-anne-rosto" rotation="0 270 0">

            </a-sphere>

            <!-- cabelo topo -->

            <a-box src="#tex-anne-cabelo" width="0.3" height="0.08" depth="0.3" position="0 1.02 0">

            </a-box>

            <!-- cabelo lateral esquerda -->

            <a-box src="#tex-anne-cabelo" width="0.08" height="0.18" depth="0.25" position="-0.15 0.85 0">

            </a-box>

            <!-- cabelo lateral direita -->

            <a-box src="#tex-anne-cabelo" width="0.08" height="0.18" depth="0.25" position="0.15 0.85 0">

            </a-box>

            <!-- braço esquerdo -->

            <a-box src="#tex-anne-vestido" width="0.12" height="0.45" depth="0.12" rotation="0 0 35"
                position="-0.22 0.3 0.15">

            </a-box>

            <!-- braço direito -->

            <a-box src="#tex-anne-vestido" width="0.12" height="0.45" depth="0.12" rotation="0 0 -35"
                position="0.22 0.3 0.15">

            </a-box>

            <!-- pernas -->

            <a-box src="#tex-anne-vestido" width="0.16" height="0.45" depth="0.16" rotation="20 0 0"
                position="-0.1 -0.2 0.15">

            </a-box>

            <a-box src="#tex-anne-vestido" width="0.16" height="0.45" depth="0.16" rotation="20 0 0"
                position="0.1 -0.2 0.15">

            </a-box>

            <!-- livro -->

            <a-box id="livro-anne" width="0.3" height="0.03" depth="0.25" rotation="-35 0 0" position="0 0.05 0.22"
                color="#d8caa0">

            </a-box>

        </a-entity>

        <!-- ====================================== -->
        <!-- ESCADA 2 -->
        <!-- ====================================== -->

        <a-entity id="escada-2" position="2.3 4.01 -4.5">

            <a-cylinder radius="0.03" height="4" position="-0.25 2 0" color="#8c6239">

            </a-cylinder>

            <a-cylinder radius="0.03" height="4.8" position="0.25 2.4 0" color="#8c6239">

            </a-cylinder>

            <a-box position="0 0.5 0" width="0.55" height="0.03" depth="0.08" color="#b78b58"></a-box>
            <a-box position="0 1.0 0" width="0.55" height="0.03" depth="0.08" color="#b78b58"></a-box>
            <a-box position="0 1.5 0" width="0.55" height="0.03" depth="0.08" color="#b78b58"></a-box>
            <a-box position="0 2.0 0" width="0.55" height="0.03" depth="0.08" color="#b78b58"></a-box>
            <a-box position="0 2.5 0" width="0.55" height="0.03" depth="0.08" color="#b78b58"></a-box>
            <a-box position="0 3.0 0" width="0.55" height="0.03" depth="0.08" color="#b78b58"></a-box>

        </a-entity>

        <!-- gatilho subir para sótão -->

        <a-box id="subir-sotao" class="interactable" visible="true" material="transparent:true; opacity:0" position="2.3 5.5 -4.5" width="1.0" height="3.2"
            depth="1.0">

        </a-box>

        <!-- ====================================== -->
        <!-- PISO DO SÓTÃO -->
        <!-- COM VÃO REAL DA ESCADA 2 -->
        <!-- ====================================== -->

        <a-plane rotation="-90 0 0" position="-1.3 8.01 -6" width="3.4" height="8" color="#75614b">

        </a-plane>

        <a-plane rotation="-90 0 0" position="1.2 8.01 -6" width="1.6" height="8" color="#75614b">

        </a-plane>

        <a-plane rotation="-90 0 0" position="2.3 8.01 -2.8" width="0.8" height="3" color="#75614b">

        </a-plane>

        <a-plane rotation="-90 0 0" position="2.3 8.01 -6.3" width="0.8" height="4" color="#75614b">

        </a-plane>

        <!-- resultado:
vão aberto em
X=2.3
Z=-4.5 -->

        <!-- ====================================== -->
        <!-- SÓTÃO -->
        <!-- ====================================== -->

        <a-plane src="#tex-sotao" position="0 10 -2" rotation="0 180 0" width="6" height="4" material="side:double">

        </a-plane>

        <!-- parede frontal -->

        <a-plane src="#tex-sotao" position="0 10 2" width="6" height="4">

        </a-plane>

        <!-- parede esquerda -->

        <a-plane src="#tex-sotao" rotation="0 90 0" position="-3 10 -6" width="8" height="4">

        </a-plane>

        <!-- parede direita -->

        <a-plane src="#tex-sotao" rotation="0 -90 0" position="3 10 -6" width="8" height="4">

        </a-plane>

        <!-- parede traseira -->

        <a-plane src="#tex-sotao" position="0 10 -10" width="6" height="4">

        </a-plane>

        <!-- teto final -->

        <a-plane rotation="90 0 0" position="0 12 -4" width="6" height="12" color="#7a4c2d" material="side:double">

        </a-plane>

        <!-- ====================================== -->
        <!-- BAÚ HISTÓRICO -->
        <!-- ====================================== -->

        <a-box id="bau-historico" class="interactable" position="-1.5 8.4 -8" width="0.9" height="0.6" depth="0.6"
            color="#6d4a2c">

        </a-box>

        <!-- ====================================== -->
        <!-- CAIXA DE DOCUMENTOS -->
        <!-- ====================================== -->

        <a-box id="caixa-documentos" class="interactable" position="1.4 8.3 -7" width="0.7" height="0.4" depth="0.5"
            color="#7b6b55">

        </a-box>

        <!-- ====================================== -->
        <!-- CASTANHEIRA (VISUAL EXTERNO) -->
        <!-- ====================================== -->

        <a-cylinder position="5 5 -6" radius="0.25" height="4" color="#5f4025">

        </a-cylinder>

        <a-sphere position="5 7.3 -6" radius="1.2" color="#4c6b39">

        </a-sphere>

        <!-- ====================================== -->
        <!-- PLANO DE FADE VR -->
        <!-- ====================================== -->

        <a-plane id="fade-plane" visible="false" position="0 0 -0.5" width="2" height="2" material="
color:black;
opacity:0" parent="visao-usuario">

        </a-plane>

    </a-scene>

    <div id="anne-audio-panel">

        <div id="anne-audio-title">

            Narração de Anne Frank

        </div>

        <button id="anne-play">

            ▶ Falar

        </button>

        <button id="anne-pause">

            ⏸ Pausar

        </button>

        <button id="anne-stop">

            ■ Parar

        </button>

    </div>

    <!-- ====================================== -->
    <!-- JOYSTICK MOBILE -->
    <!-- ====================================== -->

    <div id="mobile-joystick">

        <div id="joystick-base">

            <div id="joystick-knob"></div>

        </div>

    </div>

    <button id="mobile-action">

        INTERAGIR

    </button>

    <!-- ====================================== -->
    <!-- JAVASCRIPT -->
    <!-- ====================================== -->

    <script src="app.js"></script>

</body>

</html>
