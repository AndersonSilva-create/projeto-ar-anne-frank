<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anexo Secreto - Diário com Várias Páginas</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <style>
        /* Estilos do Modal do Diário */
        #interface-diario {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 500px;
            height: 65vh;
            background-color: #f4ebd0;
            border: 12px solid #5c4033;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            z-index: 9999;
            padding: 30px;
            box-sizing: border-box;
            font-family: 'Georgia', serif;
            color: #2b1d11;
        }
        .conteudo-diario { 
            height: 75%; 
            overflow-y: auto; 
            line-height: 1.6; 
            font-size: 1.1rem; 
            font-style: italic; 
        }
        .data-diario { font-weight: bold; margin-bottom: 15px; display: block; }
        
        /* Controles de Navegação do Diário */
        .controles-diario {
            position: absolute;
            bottom: 20px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-diario {
            background-color: #5c4033;
            color: #f4ebd0;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            font-family: sans-serif;
        }
        .btn-diario:disabled {
            background-color: #c2b69d;
            cursor: not-allowed;
        }
        .contador-paginas {
            font-family: sans-serif;
            font-size: 0.9rem;
            color: #5c4033;
            font-weight: bold;
        }
        
        /* Legenda de instruções */
        #instrucoes {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-family: sans-serif;
            pointer-events: none;
            z-index: 999;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="instrucoes">Use W,A,S,D para andar, Mouse para olhar. <br><b>Clique na Estante para abrir a passagem.</b></div>

    <!-- Interface do Diário (Com Sistema de Páginas) -->
    <div id="interface-diario">
        <div class="conteudo-diario" id="texto-pagina">
            <!-- O conteúdo será injetado dinamicamente via JavaScript -->
        </div>
        
        <div class="controles-diario">
            <button class="btn-diario" id="btn-anterior">Anterior</button>
            <span class="contador-paginas" id="giba-contador">Pág. 1 / 5</span>
            <button class="btn-diario" id="btn-proximo">Próximo</button>
            <button class="btn-diario" id="btn-fechar">Fechar</button>
        </div>
    </div>

    <a-scene background="color: #0d0d0d">
        <a-assets>
            <img id="tex-biblioteca" src="assets/biblioteca_parede.jpg">
            <img id="tex-quarto" src="assets/quarto_parede.jpg">
            <img id="tex-andar1" src="assets/andar1_parede.jpg">
            <img id="tex-sotao" src="assets/sotao_parede.jpg">
            <img id="tex-vista" src="assets/vista_rua.jpg">
        </a-assets>

        <!-- ILUMINAÇÃO -->
        <a-entity light="type: ambient; color: #ffffff; intensity: 0.6"></a-entity>
        <a-entity light="type: directional; color: #ffeebb; intensity: 0.5" position="1 4 1"></a-entity>


        <!-- ================= CÔMODO 1: A BIBLIOTECA (TÉRREO) ================= -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="6" height="4" color="#5c4033" material="side: double;"></a-plane> 
        <a-plane position="0 4 0" rotation="90 0 0" width="6" height="4" color="#f4f1ea" material="side: double;"></a-plane> 
        
        <a-plane position="-3 2 0" rotation="0 90 0" width="4" height="4" src="#tex-biblioteca"></a-plane> 
        <a-plane position="3 2 0" rotation="0 -90 0" width="4" height="4" src="#tex-biblioteca"></a-plane> 
        <a-plane position="0 2 2" rotation="0 180 0" width="6" height="4" src="#tex-biblioteca"></a-plane> 
        
        <!-- Parede da Divisória -->
        <a-plane position="-2 2 -2" rotation="0 0 0" width="2" height="4" src="#tex-biblioteca" material="side: double;"></a-plane>
        <a-plane position="2 2 -2" rotation="0 0 0" width="2" height="4" src="#tex-biblioteca" material="side: double;"></a-plane>
        <a-plane position="0 3.5 -2" rotation="0 0 0" width="2" height="1" src="#tex-biblioteca" material="side: double;"></a-plane>

        <!-- Estante Secreta -->
        <a-box id="estante-secreta" position="0 1.5 -1.9" scale="1.9 3 0.4" color="#5c4033" class="interactable"
               animation="property: position; to: 1.8 1.5 -1.9; dur: 2000; startEvents: abrirPassagem">
        </a-box>


        <!-- ================= CÔMODO 2: O QUARTO PRINCIPAL (TÉRREO) ================= -->
        <a-plane position="0 0 -6" rotation="-90 0 0" width="6" height="8" color="#3a2212" material="side: double;"></a-plane> 
        <a-plane position="-3 2 -6" rotation="0 90 0" width="8" height="4" src="#tex-quarto"></a-plane> 
        <a-plane position="3 2 -6" rotation="0 -90 0" width="8" height="4" src="#tex-quarto"></a-plane> 
        <a-plane position="0 2 -10" rotation="0 0 0" width="6" height="4" src="#tex-quarto"></a-plane> 

        <!-- MESA DO DIÁRIO -->
        <a-entity id="mesinha" position="0 0 -6.5">
            <a-box id="tampo-mesa" position="0 0.72 0" scale="0.8 0.05 0.8" color="#6e4720"></a-box>
            <a-cylinder position="-0.35 0.36 -0.35" radius="0.03" height="0.72" color="#5c4033"></a-cylinder>
            <a-cylinder position="0.35 0.36 -0.35" radius="0.03" height="0.72" color="#5c4033"></a-cylinder>
            <a-cylinder position="-0.35 0.36 0.35" radius="0.03" height="0.72" color="#5c4033"></a-cylinder>
            <a-cylinder position="0.35 0.36 0.35" radius="0.03" height="0.72" color="#5c4033"></a-cylinder>
        </a-entity>
        <a-box id="objeto-diario" position="0 0.8 -6.5" scale="0.4 0.08 0.5" color="#a63a2b" class="interactable"></a-box>

        <!-- Armário alinhado na Parede Esquerda -->
        <a-entity id="armario" position="-2.7 0 -8.5">
            <a-box scale="0.6 2.8 1.4" color="#5c4033" position="0 1.4 0"></a-box>
            <a-box scale="0.02 2.6 0.65" position="0.31 1.4 -0.33" color="#6e4720"></a-box>
            <a-box scale="0.02 2.6 0.65" position="0.31 1.4 0.33" color="#6e4720"></a-box>
            <a-sphere position="0.33 1.4 -0.05" radius="0.03" color="#d4af37"></a-sphere>
            <a-sphere position="0.33 1.4 0.05" radius="0.03" color="#d4af37"></a-sphere>
        </a-entity>


        <!-- ================= ESCADA 1: QUARTO <-> 1º ANDAR ================= -->
        <a-entity id="escada-complexa-1" position="-2.3 0 -4.5">
            <a-box scale="0.1 6 0.1" color="#777" position="-0.3 3 0"></a-box>
            <a-box scale="0.1 6 0.1" color="#777" position="0.3 3 0"></a-box>
            <a-box scale="0.7 0.05 0.05" color="#777" position="0 0.5 0"></a-box>
            <a-box scale="0.7 0.05 0.05" color="#777" position="0 1.5 0"></a-box>
            <a-box scale="0.7 0.05 0.05" color="#777" position="0 2.5 0"></a-box>
            <a-box scale="0.7 0.05 0.05" color="#777" position="0 3.5 0"></a-box>
            <a-box scale="0.7 0.05 0.05" color="#777" position="0 4.5 0"></a-box>
            <a-box scale="0.7 0.05 0.05" color="#777" position="0 5.5 0"></a-box>

            <a-box id="btn-subir-1" class="interactable" position="0 2 0" scale="1 4 0.5" visible="false"></a-box>
            <a-box id="btn-descer-1" class="interactable" position="0 5 0" scale="1 2 0.5" visible="false"></a-box>
        </a-entity>


        <!-- ================= CÔMODOS SUPERIORES (SEGUNDO ANDAR / 1º ANDAR) ================= -->
        <a-plane position="1 4.01 -6" rotation="-90 0 0" width="4" height="8" color="#5c4033" material="side: double;"></a-plane> 
        <a-plane position="-2 4.01 -7.5" rotation="-90 0 0" width="2" height="5" color="#5c4033" material="side: double;"></a-plane> 
        <a-plane position="-2 4.01 -3" rotation="-90 0 0" width="2" height="2" color="#5c4033" material="side: double;"></a-plane> 
        
        <!-- Paredes do 2º andar -->
        <a-plane position="-3 6 -6" rotation="0 90 0" width="8" height="4" src="#tex-andar1"></a-plane>
        <a-plane position="0 6 -10" rotation="0 0 0" width="6" height="4" src="#tex-andar1"></a-plane>
        <a-plane position="0 6 -2" rotation="0 180 0" width="6" height="4" src="#tex-andar1"></a-plane>

        <!-- Janela na Parede Direita -->
        <a-plane position="3 6 -3.5" rotation="0 -90 0" width="3" height="4" src="#tex-andar1" material="side: double;"></a-plane> 
        <a-plane position="3 6 -8.5" rotation="0 -90 0" width="3" height="4" src="#tex-andar1" material="side: double;"></a-plane> 
        <a-plane position="3 4.6 -6" rotation="0 -90 0" width="2" height="1.2" src="#tex-andar1" material="side: double;"></a-plane> 
        <a-plane position="3 7.4 -6" rotation="0 -90 0" width="2" height="1.2" src="#tex-andar1" material="side: double;"></a-plane> 

        <a-plane position="3.01 6 -6" rotation="0 -90 0" width="2" height="1.6" src="#tex-vista" color="#a0c0d0" material="side: double;"></a-plane>
        
        <a-box position="2.98 6 -5" scale="0.06 1.6 0.06" color="#2b1d11"></a-box> 
        <a-box position="2.98 6 -7" scale="0.06 1.6 0.06" color="#2b1d11"></a-box> 
        <a-box position="2.98 6.8 -6" scale="0.06 0.06 2.06" color="#2b1d11"></a-box> 
        <a-box position="2.98 5.2 -6" scale="0.06 0.06 2.06" color="#2b1d11"></a-box> 
        <a-box position="2.98 6 -6" scale="0.04 1.6 0.04" color="#2b1d11"></a-box> 
        <a-box position="2.98 6 -6" scale="0.04 0.04 2.02" color="#2b1d11"></a-box>

        <!-- Cama travada contra a parede traseira -->
        <a-entity id="cama-andar1" position="0.8 4.01 -8.9">
            <a-box scale="1.4 0.3 2" color="#5c4033" position="0 0.15 0"></a-box>
            <a-box scale="1.3 0.15 1.9" color="#f4ebd0" position="0 0.35 0"></a-box>
            <a-box scale="1.1 0.1 0.4" color="#ffffff" position="0 0.45 -0.7"></a-box>
            <a-box scale="1.4 0.8 0.1" color="#4a2f13" position="0 0.4 -0.95"></a-box>
        </a-entity>


        <!-- ================= ESCADA 2: 1º ANDAR <-> SÓTÃO ================= -->
        <a-entity id="escada-complexa-2" position="2.3 4 -4.5">
            <a-box scale="0.1 6 0.1" color="#666" position="-0.3 3 0"></a-box>
            <a-box scale="0.1 6 0.1" color="#666" position="0.3 3 0"></a-box>
            <a-box scale="0.7 0.05 0.05" color="#666" position="0 0.5 0"></a-box>
            <a-box scale="0.7 0.05 0.05" color="#666" position="0 1.5 0"></a-box>
            <a-box scale="0.7 0.05 0.05" color="#666" position="0 2.5 0"></a-box>
            <a-box scale="0.7 0.05 0.05" color="#666" position="0 3.5 0"></a-box>
            <a-box scale="0.7 0.05 0.05" color="#666" position="0 4.5 0"></a-box>
            <a-box scale="0.7 0.05 0.05" color="#666" position="0 5.5 0"></a-box>

            <a-box id="btn-subir-2" class="interactable" position="0 2 0" scale="1 4 0.5" visible="false"></a-box>
            <a-box id="btn-descer-2" class="interactable" position="0 5 0" scale="1 2 0.5" visible="false"></a-box>
        </a-entity>


        <!-- ================= CÔMODO FINAL: O SÓTÃO ================= -->
        <a-plane position="-1 8.01 -6" rotation="-90 0 0" width="4" height="8" color="#3a2212" material="side: double;"></a-plane> 
        <a-plane position="2 8.01 -7.5" rotation="-90 0 0" width="2" height="5" color="#3a2212" material="side: double;"></a-plane> 
        <a-plane position="2 8.01 -3" rotation="-90 0 0" width="2" height="2" color="#3a2212" material="side: double;"></a-plane> 

        <a-plane position="-3 10 -6" rotation="0 90 0" width="8" height="4" src="#tex-sotao"></a-plane>
        <a-plane position="3 10 -6" rotation="0 -90 0" width="8" height="4" src="#tex-sotao"></a-plane>
        <a-plane position="0 10 -10" rotation="0 0 0" width="6" height="4" src="#tex-sotao"></a-plane>
        <a-plane position="0 10 -2" rotation="0 180 0" width="6" height="4" src="#tex-sotao"></a-plane>
        
        <a-plane position="0 12 -6" rotation="90 0 0" width="6" height="8" color="#f4f1ea" material="side: double;"></a-plane> 


        <!-- ================= SISTEMA DE CÂMERA E SEUS CONTROLES ================= -->
        <a-entity id="camera-rig" position="0 1.6 0">
            <a-entity camera look-controls wasd-controls id="visao-usuario">
                <a-cursor raycaster="objects: .interactable" color="#ffffff" scale="0.5 0.5 0.5"></a-cursor>
            </a-entity>
        </a-entity>

    </a-scene>

    <script>
        // Elementos de Interação
        const estante = document.querySelector('#estante-secreta');
        const diarioVirtual = document.querySelector('#objeto-diario');
        const interfaceDiario = document.querySelector('#interface-diario');
        const botaoFechar = document.querySelector('#btn-fechar');
        const cameraEfeito = document.querySelector('#visao-usuario');
        const cameraRig = document.querySelector('#camera-rig');
        
        const subir1 = document.querySelector('#btn-subir-1');
        const descer1 = document.querySelector('#btn-descer-1');
        const subir2 = document.querySelector('#btn-subir-2');
        const descer2 = document.querySelector('#btn-descer-2');
        
        const textoInstrucoes = document.querySelector('#instrucoes');

        // Elementos do Sistema de Páginas do Diário
        const textoPagina = document.querySelector('#texto-pagina');
        const btnAnterior = document.querySelector('#btn-anterior');
        const btnProximo = document.querySelector('#btn-proximo');
        const gibaContador = document.querySelector('#giba-contador');

        // Conteúdo das Páginas do Diário
        const paginasDiario = [
            {
                data: "9 de Julho de 1942",
                texto: '"Ficou combinado que partiríamos no dia 16 de julho... Mas a passagem teve de ser antecipada. O esconderijo era no prédio dos escritórios do papai. Uma estante giratória esconde a porta de entrada..."'
            },
            {
                data: "11 de Julho de 1942",
                texto: '"O Anexo Secreto é o esconderijo ideal. Embora seja úmido e inclinado, você não encontrará outro local tão confortavelmente decorado em toda Amsterdã, nem mesmo em toda a Holanda. Nossas janelas permanecem fechadas o tempo todo, mas o silêncio nos protege."'
            },
            {
                data: "1 de Outubro de 1942",
                texto: '"Ontem apanhei um susto terrível. Às oito horas da noite, a campainha tocou forte. Pensei logo que fosse alguém vindo nos buscar. Mas era apenas o entregador. O pavor que sinto dos barulhos da noite me faz perceber o quão frágil é a nossa segurança aqui dentro."'
            },
            {
                data: "19 de Novembro de 1942",
                texto: '"Poderíamos fechar os olhos perante toda essa miséria, mas pensamos naqueles que nos eram queridos, e para os quais tememos o pior. E tudo isto por quê? Porque são judeus... Sinto-me má por estar numa cama quente, enquanto as minhas amigas mais queridas foram jogadas em campos de concentração."'
            },
            {
                data: "6 de Junho de 1944",
                texto: '"É o Dia D! A invasão começou! Os Aliados desembarcaram na Normandia. O rádio fala em notícias de esperança. Será que a libertação está próxima? Este ano de 1944 nos trará a vitória? Oh, Kitty, a ideia de poder voltar para a escola em setembro me faz chorar de alegria!"'
            }
        ];

        let paginaAtual = 0;

        function atualizarModalDiario() {
            const dadosPagina = paginasDiario[paginaAtual];
            textoPagina.innerHTML = `<span class="data-diario">${dadosPagina.data}</span><p>${dadosPagina.texto}</p>`;
            gibaContador.innerText = `Pág. ${paginaAtual + 1} / ${paginasDiario.length}`;
            
            // Gerenciar estado dos botões
            btnAnterior.disabled = paginaAtual === 0;
            btnProximo.disabled = paginaAtual === paginasDiario.length - 1;
        }

        // Eventos dos botões do Diário
        btnAnterior.addEventListener('click', function() {
            if (paginaAtual > 0) {
                paginaAtual--;
                atualizarModalDiario();
            }
        });

        btnProximo.addEventListener('click', function() {
            if (paginaAtual < paginasDiario.length - 1) {
                paginaAtual++;
                atualizarModalDiario();
            }
        });

        // Abrir e Fechar Diário
        diarioVirtual.addEventListener('click', function () {
            paginaAtual = 0; // Sempre começa na primeira página ao abrir
            atualizarModalDiario();
            interfaceDiario.style.display = 'block';
            cameraEfeito.components['look-controls'].pause();
            document.exitPointerLock();
        });

        botaoFechar.addEventListener('click', function () {
            interfaceDiario.style.display = 'none';
            cameraEfeito.components['look-controls'].play();
        });

        // Funcionamento da Estante
        estante.addEventListener('click', function () {
            estante.emit('abrirPassagem');
            textoInstrucoes.innerHTML = "A passagem abriu. Siga em frente.";
        });

        // Controles de Teletransporte das Escadas
        subir1.addEventListener('click', function () {
            cameraRig.setAttribute('position', '0.5 5.6 -5.5'); 
            textoInstrucoes.innerHTML = "2º Andar. Olhe ao redor.";
        });
        descer1.addEventListener('click', function () {
            cameraRig.setAttribute('position', '0 1.6 -5.5'); 
            textoInstrucoes.innerHTML = "De volta ao Quarto Principal.";
        });

        subir2.addEventListener('click', function () {
            cameraRig.setAttribute('position', '-0.5 9.6 -5.5'); 
            textoInstrucoes.innerHTML = "O Sótão.";
        });
        descer2.addEventListener('click', function () {
            cameraRig.setAttribute('position', '0.5 5.6 -5.5'); 
            textoInstrucoes.innerHTML = "De volta ao 2º Andar.";
        });
    </script>
</body>
</html>
