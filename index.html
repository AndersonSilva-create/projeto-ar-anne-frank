<style>

html,
body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Georgia, serif;
}

#hud{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    z-index:1000;

    background:rgba(0,0,0,0.7);
    color:white;

    padding:10px 18px;
    border-radius:8px;

    font-size:14px;
}

#diarioModal{
    display:none;

    position:fixed;
    inset:0;

    z-index:2000;

    background:rgba(0,0,0,0.7);

    align-items:center;
    justify-content:center;
}

#diarioContainer{

    width:min(800px,90vw);
    height:min(650px,85vh);

    background:#f4ebd0;

    border-radius:12px;

    padding:30px;

    box-sizing:border-box;

    display:flex;
    flex-direction:column;

    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

#diarioData{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

#diarioTexto{
    flex:1;

    font-size:20px;
    line-height:1.8;

    overflow:auto;
}

#diarioControles{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-top:20px;
}

#diarioControles button{

    padding:10px 20px;

    border:none;
    border-radius:6px;

    cursor:pointer;

    font-size:16px;
}

#contadorPagina{
    font-weight:bold;
}

button:disabled{
    opacity:0.4;
    cursor:not-allowed;
}

</style>
</head>

<script>

/* ===================================================== */
/* CONSTANTES */
/* ===================================================== */

const PAGINAS_DIARIO = [

{
data: "9 de Julho de 1942",
texto:
"Ficou combinado que partiríamos no dia 16 de julho. Mas a passagem teve de ser antecipada. O esconderijo era no prédio dos escritórios do papai. Uma estante giratória esconde a porta de entrada..."
},

{
data: "11 de Julho de 1942",
texto:
"O Anexo Secreto é o esconderijo ideal. Embora seja úmido e inclinado, você não encontrará outro local tão confortavelmente decorado em toda Amsterdã, nem mesmo em toda a Holanda..."
},

{
data: "1 de Outubro de 1942",
texto:
"Ontem apanhei um susto terrível. Às oito horas da noite, a campainha tocou forte. Pensei logo que fosse alguém vindo nos buscar. Mas era apenas o entregador..."
},

{
data: "19 de Novembro de 1942",
texto:
"Poderíamos fechar os olhos perante toda essa miséria, mas pensamos naqueles que nos eram queridos, e para os quais tememos o pior. E tudo isto por quê? Porque são judeus..."
},

{
data: "6 de Junho de 1944",
texto:
"É o Dia D. A invasão começou. Os Aliados desembarcaram na Normandia. O rádio fala em notícias de esperança. Será que a libertação está próxima?..."
}

];

/* ===================================================== */
/* REFERÊNCIAS DOM */
/* ===================================================== */

const cameraRig =
document.getElementById("camera-rig");

const cameraUsuario =
document.getElementById("visao-usuario");

const estanteSecreta =
document.getElementById("estante-secreta");

const objetoDiario =
document.getElementById("objeto-diario");

const modalDiario =
document.getElementById("diarioModal");

const diarioData =
document.getElementById("diarioData");

const diarioTexto =
document.getElementById("diarioTexto");

const contadorPagina =
document.getElementById("contadorPagina");

const btnAnterior =
document.getElementById("btnAnterior");

const btnProximo =
document.getElementById("btnProximo");

const btnFechar =
document.getElementById("btnFechar");

/* ===================================================== */
/* ESTADO GLOBAL */
/* ===================================================== */

let paginaAtual = 0;

let estanteAberta = false;

/* ===================================================== */
/* UTILIDADES */
/* ===================================================== */

function atualizarPaginaDiario(){

    const pagina =
    PAGINAS_DIARIO[paginaAtual];

    diarioData.textContent =
    pagina.data;

    diarioTexto.textContent =
    pagina.texto;

    contadorPagina.textContent =
    `Pág. ${paginaAtual + 1} / ${PAGINAS_DIARIO.length}`;

    btnAnterior.disabled =
    paginaAtual === 0;

    btnProximo.disabled =
    paginaAtual === PAGINAS_DIARIO.length - 1;
}

/* ===================================================== */
/* CONTROLES DE CÂMERA */
/* ===================================================== */

function pausarCamera(){

    if(
        cameraUsuario.components["look-controls"]
    ){
        cameraUsuario
        .components["look-controls"]
        .pause();
    }

    if(document.exitPointerLock){
        document.exitPointerLock();
    }

}

function ativarCamera(){

    if(
        cameraUsuario.components["look-controls"]
    ){
        cameraUsuario
        .components["look-controls"]
        .play();
    }

}

/* ===================================================== */
/* DIÁRIO */
/* ===================================================== */

function abrirDiario(){

    paginaAtual = 0;

    atualizarPaginaDiario();

    pausarCamera();

    modalDiario.style.display =
    "flex";

}

function fecharDiario(){

    modalDiario.style.display =
    "none";

    ativarCamera();

}

/* ===================================================== */
/* BOTÕES DO DIÁRIO */
/* ===================================================== */

btnAnterior.addEventListener(
"click",
function(){

    if(paginaAtual > 0){

        paginaAtual--;

        atualizarPaginaDiario();

    }

}
);

btnProximo.addEventListener(
"click",
function(){

    if(
        paginaAtual <
        PAGINAS_DIARIO.length - 1
    ){

        paginaAtual++;

        atualizarPaginaDiario();

    }

}
);

btnFechar.addEventListener(
"click",
function(){

    fecharDiario();

}
);

/* ===================================================== */
/* CLIQUE NO DIÁRIO VERMELHO */
/* ===================================================== */

objetoDiario.addEventListener(
"click",
function(){

    abrirDiario();

}
);

/* ===================================================== */
/* ANNE FRANK */
/* Preparado para futuras interações */
/* ===================================================== */

const anneFrank =
document.getElementById(
"anne-frank-3d"
);

anneFrank.addEventListener(
"click",
function(){

    console.log(
    "Anne Frank clicada"
    );

}
);


/* ===================================================== */
/* HUD */
/* ===================================================== */

const hud =
document.getElementById("hud");

function atualizarHUD(texto){

    hud.textContent = texto;

}

/* ===================================================== */
/* ANIMAÇÃO DA ESTANTE SECRETA */
/* ===================================================== */

function abrirEstante(){

    estanteSecreta.setAttribute(
    "animation",
    {
        property: "position",
        to: "1.8 1.5 -1.9",
        dur: 1500,
        easing: "easeInOutQuad"
    });

    estanteAberta = true;

    atualizarHUD(
    "Passagem revelada. Entre no Anexo Secreto."
    );

}

function fecharEstante(){

    estanteSecreta.setAttribute(
    "animation",
    {
        property: "position",
        to: "0 1.5 -1.9",
        dur: 1500,
        easing: "easeInOutQuad"
    });

    estanteAberta = false;

    atualizarHUD(
    "Clique na estante para abrir a passagem."
    );

}

function alternarEstante(){

    if(estanteAberta){

        fecharEstante();

    }
    else{

        abrirEstante();

    }

}

/* ===================================================== */
/* EVENTO DA ESTANTE */
/* ===================================================== */

estanteSecreta.addEventListener(
"click",
function(){

    alternarEstante();

}
);

/* ===================================================== */
/* TELETRANSPORTE */
/* ===================================================== */

function teleportar(x,y,z){

    cameraRig.setAttribute(
    "position",
    {
        x:x,
        y:y,
        z:z
    });

}

/* ===================================================== */
/* REFERÊNCIAS DAS ESCADAS */
/* ===================================================== */

const subirAndar1 =
document.getElementById(
"subir-andar1"
);

const descerTerreo =
document.getElementById(
"descer-terreo"
);

const subirSotao =
document.getElementById(
"subir-sotao"
);

const descerAndar1 =
document.getElementById(
"descer-andar1"
);

/* ===================================================== */
/* ESCADA 1 */
/* TÉRREO -> SEGUNDO ANDAR */
/* ===================================================== */

subirAndar1.addEventListener(
"click",
function(){

    teleportar(
    2.2,
    5.6,
    -3
    );

    atualizarHUD(
    "Segundo andar."
    );

}
);

descerTerreo.addEventListener(
"click",
function(){

    teleportar(
    2.2,
    1.6,
    -3
    );

    atualizarHUD(
    "Térreo."
    );

}
);

/* ===================================================== */
/* ESCADA 2 */
/* SEGUNDO ANDAR -> SÓTÃO */
/* ===================================================== */

subirSotao.addEventListener(
"click",
function(){

    teleportar(
    -2.2,
    9.6,
    -8
    );

    atualizarHUD(
    "Sótão."
    );

}
);

descerAndar1.addEventListener(
"click",
function(){

    teleportar(
    -2.2,
    5.6,
    -8
    );

    atualizarHUD(
    "Segundo andar."
    );

}
);

/* ===================================================== */
/* SISTEMA DE MENSAGENS CONTEXTUAIS */
/* ===================================================== */

function mensagemInicial(){

    atualizarHUD(
    "Use WASD para andar. Clique na estante secreta para revelar a passagem."
    );

}

function mensagemBiblioteca(){

    atualizarHUD(
    "Biblioteca. Procure a estante secreta."
    );

}

function mensagemQuarto(){

    atualizarHUD(
    "Quarto Principal. Clique no diário vermelho."
    );

}

function mensagemAndar1(){

    atualizarHUD(
    "Segundo andar. Anne Frank está sentada sobre a cama."
    );

}

function mensagemSotao(){

    atualizarHUD(
    "Sótão. Espaço utilizado como armazenamento."
    );

}

/* ===================================================== */
/* DETECÇÃO SIMPLES DE ALTURA */
/* ===================================================== */

setInterval(function(){

    const posicao =
    cameraRig.getAttribute(
    "position"
    );

    if(!posicao){
        return;
    }

    if(posicao.y < 4){

        mensagemBiblioteca();

        return;
    }

    if(
        posicao.y >= 4 &&
        posicao.y < 8
    ){

        mensagemAndar1();

        return;
    }

    if(posicao.y >= 8){

        mensagemSotao();

    }

},3000);

/* ===================================================== */
/* PREPARAÇÃO PARA MÓDULOS FUTUROS */
/* ===================================================== */

const Modulos = {

    dialogos:false,

    colisoes:false,

    audio:false,

    narracao:false,

    inventario:false

};

function registrarModulo(
nome,
estado
){

    Modulos[nome] = estado;

}

function moduloAtivo(
nome
){

    return Modulos[nome] === true;

}


/* ===================================================== */
/* FECHAR DIÁRIO COM ESC */
/* ===================================================== */

document.addEventListener(
"keydown",
function(event){

    if(
        event.key === "Escape" &&
        modalDiario.style.display === "flex"
    ){

        fecharDiario();

    }

}
);

/* ===================================================== */
/* BLOQUEIO DE MOVIMENTO QUANDO O DIÁRIO ESTÁ ABERTO */
/* ===================================================== */

function desativarMovimento(){

    cameraUsuario.removeAttribute(
    "wasd-controls"
    );

}

function ativarMovimento(){

    cameraUsuario.setAttribute(
    "wasd-controls",
    "acceleration: 65"
    );

}

/* ===================================================== */
/* SOBRESCREVER ABERTURA/FECHAMENTO */
/* ===================================================== */

const abrirDiarioOriginal =
abrirDiario;

abrirDiario = function(){

    abrirDiarioOriginal();

    desativarMovimento();

};

const fecharDiarioOriginal =
fecharDiario;

fecharDiario = function(){

    fecharDiarioOriginal();

    ativarMovimento();

};

/* ===================================================== */
/* FECHAR AO CLICAR FORA */
/* ===================================================== */

modalDiario.addEventListener(
"click",
function(event){

    if(
        event.target === modalDiario
    ){

        fecharDiario();

    }

}
);

/* ===================================================== */
/* EVENTOS DA CENA */
/* ===================================================== */

const cena =
document.querySelector(
"a-scene"
);

cena.addEventListener(
"loaded",
function(){

    console.log(
    "Cena carregada."
    );

    mensagemInicial();

}
);

/* ===================================================== */
/* VISIBILIDADE DA ABA */
/* ===================================================== */

document.addEventListener(
"visibilitychange",
function(){

    if(document.hidden){

        console.log(
        "Aplicação em segundo plano."
        );

    }else{

        console.log(
        "Aplicação ativa."
        );

    }

}
);

/* ===================================================== */
/* SEGURANÇA */
/* ===================================================== */

window.addEventListener(
"error",
function(event){

    console.error(
    "Erro capturado:",
    event.error
    );

}
);

/* ===================================================== */
/* FUNÇÕES AUXILIARES FUTURAS */
/* ===================================================== */

function abrirDialogo(
titulo,
texto
){

    console.log(
    "Dialogo:",
    titulo,
    texto
    );

}

function tocarAudio(
arquivo
){

    console.log(
    "Audio:",
    arquivo
    );

}

function iniciarNarracao(
texto
){

    console.log(
    "Narracao:",
    texto
    );

}

function adicionarObjetoInventario(
idObjeto
){

    console.log(
    "Inventario:",
    idObjeto
    );

}

/* ===================================================== */
/* API GLOBAL OPCIONAL */
/* ===================================================== */

window.AnexoSecreto = {

    abrirDiario,

    fecharDiario,

    teleportar,

    abrirEstante,

    fecharEstante,

    alternarEstante,

    registrarModulo,

    moduloAtivo

};

/* ===================================================== */
/* ESTADO INICIAL */
/* ===================================================== */

atualizarPaginaDiario();

mensagemInicial();

console.log(
"Anexo Secreto iniciado."
);

</script>

</body>
</html>
