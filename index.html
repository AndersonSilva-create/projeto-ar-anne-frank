<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">

    <title>
        Anexo Secreto WebVR AR
    </title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <style>
        html,
        body {

            margin: 0;
            padding: 0;

            width: 100%;
            height: 100%;

            overflow: hidden;

            background: #000;

            font-family: Georgia, serif;

        }

        /* ===================================================== */
        /* HUD */
        /* ===================================================== */

        #hud {

            position: fixed;

            top: 10px;
            left: 50%;

            transform: translateX(-50%);

            z-index: 5000;

            background: rgba(0, 0, 0, 0.75);

            color: white;

            padding: 12px 18px;

            border-radius: 10px;

            font-size: 14px;

            text-align: center;

            pointer-events: none;

            max-width: 90vw;

        }

        /* ===================================================== */
        /* MODAL DIARIO */
        /* ===================================================== */

        #diarioModal {

            display: none;

            position: fixed;

            inset: 0;

            z-index: 8000;

            background: rgba(0, 0, 0, 0.7);

            justify-content: center;
            align-items: center;

        }

        #diarioContainer {

            width: min(900px, 90vw);

            height: min(650px, 85vh);

            background: #f4ebd0;

            border-radius: 14px;

            padding: 30px;

            box-sizing: border-box;

            display: flex;
            flex-direction: column;

            box-shadow:
                0 0 40px rgba(0, 0, 0, 0.6);

        }

        #diarioData {

            font-size: 26px;

            font-weight: bold;

            margin-bottom: 20px;

        }

        #diarioTexto {

            flex: 1;

            overflow-y: auto;

            line-height: 1.9;

            font-size: 20px;

        }

        #diarioControles {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-top: 25px;

        }

        #diarioControles button {

            padding: 12px 22px;

            border: none;

            border-radius: 8px;

            cursor: pointer;

            font-size: 16px;

        }

        #contadorPagina {

            font-weight: bold;

        }

        button:disabled {

            opacity: 0.4;

            cursor: not-allowed;

        }

        /* ===================================================== */
        /* MODAL QR CODE */
        /* ===================================================== */

        #qrModal {

            display: none;

            position: fixed;

            inset: 0;

            z-index: 8500;

            background: rgba(0, 0, 0, 0.7);

            justify-content: center;

            align-items: center;

        }

        #qrContainer {

            background: white;

            border-radius: 12px;

            padding: 25px;

            text-align: center;

            width: 350px;

        }

        #qrContainer h2 {

            margin-top: 0;

        }

        #qrImage {

            width: 250px;

            height: 250px;

            object-fit: contain;

        }

        #btnAbrirQR {

            position: fixed;

            right: 15px;

            bottom: 15px;

            z-index: 6000;

            border: none;

            border-radius: 10px;

            background: #222;

            color: white;

            padding: 12px 18px;

            cursor: pointer;

        }

        /* ===================================================== */
        /* DIALOGO ANNE */
        /* ===================================================== */

        #anneDialogo {

            position: fixed;

            bottom: 140px;

            right: 20px;

            z-index: 7000;

            display: none;

            max-width: 320px;

            padding: 15px;

            border-radius: 12px;

            background: white;

            color: #111;

            box-shadow:
                0 0 20px rgba(0, 0, 0, 0.4);

            font-size: 15px;

            line-height: 1.6;

        }

        /* ===================================================== */
        /* JOYSTICK MOBILE */
        /* ===================================================== */

        #joystickBase {

            position: fixed;

            left: 25px;

            bottom: 25px;

            width: 140px;

            height: 140px;

            border-radius: 50%;

            background: rgba(255, 255, 255, 0.12);

            border: 2px solid rgba(255, 255, 255, 0.3);

            z-index: 7000;

            display: none;

            touch-action: none;

        }

        #joystickKnob {

            position: absolute;

            width: 60px;

            height: 60px;

            border-radius: 50%;

            background: rgba(255, 255, 255, 0.5);

            left: 40px;

            top: 40px;

        }

        @media (max-width:900px) {

            #joystickBase {

                display: block;

            }

        }
    </style>

</head>

<body>

    <div id="hud">

        Use WASD ou Joystick para mover.
        Clique na estante secreta.

    </div>

    <div id="anneDialogo"></div>

    <button id="btnAbrirQR">

        Jogar no Celular / AR

    </button>


    <!-- ===================================================== -->
    <!-- MODAL QR CODE -->
    <!-- ===================================================== -->

    <div id="qrModal">

        <div id="qrContainer">

            <h2>
                Jogar no Celular
            </h2>

            <p>
                Escaneie o QR Code para abrir este projeto
                no smartphone e utilizar giroscópio ou AR.
            </p>

            <img id="qrImage" alt="QR Code">

            <br><br>

            <button id="btnFecharQR">
                Fechar
            </button>

        </div>

    </div>

    <!-- ===================================================== -->
    <!-- MODAL DIÁRIO -->
    <!-- ===================================================== -->

    <div id="diarioModal">

        <div id="diarioContainer">

            <div id="diarioData">
            </div>

            <div id="diarioTexto">
            </div>

            <div id="diarioControles">

                <button id="btnAnterior">
                    Anterior
                </button>

                <span id="contadorPagina">
                </span>

                <button id="btnProximo">
                    Próximo
                </button>

                <button id="btnFecharDiario">
                    Fechar
                </button>

            </div>

        </div>

    </div>

    <!-- ===================================================== -->
    <!-- JOYSTICK MOBILE -->
    <!-- ===================================================== -->

    <div id="joystickBase">

        <div id="joystickKnob">
        </div>

    </div>

    <!-- ===================================================== -->
    <!-- CENA WEBXR -->
    <!-- ===================================================== -->

    <a-scene renderer="
antialias:true;
colorManagement:true;
physicallyCorrectLights:true" xr-mode-ui="enabled: true" webxr="
optionalFeatures:
local-floor,
bounded-floor,
hand-tracking,
hit-test,
anchors" background="color:#111111" loading-screen="
dotsColor:#ffffff;
backgroundColor:#000000">

        <!-- ===================================================== -->
        <!-- ASSETS -->
        <!-- ===================================================== -->

        <a-assets>

            <img id="tex-biblioteca" src="assets/biblioteca_parede.jpg">

            <img id="tex-quarto" src="assets/quarto_parede.jpg">

            <img id="tex-andar1" src="assets/andar1_parede.jpg">

            <img id="tex-sotao" src="assets/sotao_parede.jpg">

            <img id="tex-vista" src="assets/vista_rua.jpg">

            <img id="tex-anne-vestido" src="assets/anne_vestido.jpg">

            <img id="tex-anne-rosto" src="assets/anne_rosto.jpg">

            <img id="tex-anne-cabelo" src="assets/anne_cabelo.jpg">

        </a-assets>

        <!-- ===================================================== -->
        <!-- ILUMINAÇÃO -->
        <!-- ===================================================== -->

        <a-entity light="
type:ambient;
intensity:0.9">
        </a-entity>

        <a-entity light="
type:directional;
intensity:0.8" position="2 8 3">
        </a-entity>

        <a-entity light="
type:point;
intensity:0.5;
distance:25" position="0 5 -6">
        </a-entity>

        <!-- ===================================================== -->
        <!-- CAMERA RIG -->
        <!-- ===================================================== -->

        <a-entity id="camera-rig" position="0 1.6 0" motor-colisao>

            <a-entity camera id="visao-usuario" look-controls="
    magicWindowTrackingEnabled:true;
    touchEnabled:true" wasd-controls="
    acceleration:65">

                <a-cursor color="#ffffff" scale="0.5 0.5 0.5" raycaster="
        objects:.interactable">

                </a-cursor>

            </a-entity>

        </a-entity>

        <!-- ===================================================== -->
        <!-- CHÃO GLOBAL TEMPORÁRIO -->
        <!-- (será substituído pelas lajes reais) -->
        <!-- ===================================================== -->

        <a-plane rotation="-90 0 0" width="30" height="30" color="#2c2c2c">
        </a-plane>

        <!-- ===================================================== -->
        <!-- MARCADOR DE ORIGEM -->
        <!-- ===================================================== -->

        <a-sphere position="0 0.05 0" radius="0.05" color="#ffffff" visible="false">
        </a-sphere>

        <!-- ===================================================== -->
        <!-- INÍCIO DA BIBLIOTECA -->
        <!-- ===================================================== -->

        <!-- piso -->

        <a-box position="0 -0.05 0" width="6" height="0.1" depth="4" color="#70553b">
        </a-box>

        <!-- teto -->

        <a-box position="0 4 0" width="6" height="0.1" depth="4" color="#d8d8d8">
        </a-box>

        <!-- parede esquerda -->

        <a-box position="-3 2 0" width="0.1" height="4" depth="4" src="#tex-biblioteca">
        </a-box>

        <!-- parede direita -->

        <a-box position="3 2 0" width="0.1" height="4" depth="4" src="#tex-biblioteca">
        </a-box>

        <!-- parede frontal -->

        <a-box position="0 2 2" width="6" height="4" depth="0.1" src="#tex-biblioteca">
        </a-box>

        <!-- divisória esquerda -->

        <a-box position="-2 2 -2" width="2" height="4" depth="0.1" src="#tex-biblioteca">
        </a-box>

        <!-- divisória direita -->

        <a-box position="2 2 -2" width="2" height="4" depth="0.1" src="#tex-biblioteca">
        </a-box>


        <!-- ===================================================== -->
        <!-- ESTANTE SECRETA -->
        <!-- ===================================================== -->

        <a-box id="estante-secreta" class="interactable" position="0 1.5 -1.9" width="1.9" height="3" depth="0.4"
            color="#5b3c20">

        </a-box>

        <!-- ===================================================== -->
        <!-- QUARTO PRINCIPAL -->
        <!-- ===================================================== -->

        <!-- piso -->

        <a-box position="0 -0.05 -6" width="6" height="0.1" depth="8" color="#6d5238">
        </a-box>

        <!-- teto será substituído por laje vazada -->

        <!-- parede esquerda -->

        <a-box position="-3 2 -6" width="0.1" height="4" depth="8" src="#tex-quarto">
        </a-box>

        <!-- parede direita -->

        <a-box position="3 2 -6" width="0.1" height="4" depth="8" src="#tex-quarto">
        </a-box>

        <!-- parede traseira -->

        <a-box position="0 2 -10" width="6" height="4" depth="0.1" src="#tex-quarto">
        </a-box>

        <!-- ===================================================== -->
        <!-- MESA DO DIÁRIO -->
        <!-- ===================================================== -->

        <a-entity id="mesa-diario" position="0 0 -6.5">

            <!-- tampo -->

            <a-box position="0 0.75 0" width="1.6" height="0.1" depth="0.8" color="#7b4d25">
            </a-box>

            <!-- pernas -->

            <a-cylinder position="-0.7 0.35 -0.3" radius="0.05" height="0.7" color="#5a3519">
            </a-cylinder>

            <a-cylinder position="0.7 0.35 -0.3" radius="0.05" height="0.7" color="#5a3519">
            </a-cylinder>

            <a-cylinder position="-0.7 0.35 0.3" radius="0.05" height="0.7" color="#5a3519">
            </a-cylinder>

            <a-cylinder position="0.7 0.35 0.3" radius="0.05" height="0.7" color="#5a3519">
            </a-cylinder>

        </a-entity>

        <!-- ===================================================== -->
        <!-- DIÁRIO VERMELHO -->
        <!-- ===================================================== -->

        <a-box id="objeto-diario" class="interactable" position="0 0.8 -6.5" width="0.4" height="0.08" depth="0.5"
            color="#b00000">

        </a-box>

        <!-- ===================================================== -->
        <!-- ARMÁRIO -->
        <!-- ===================================================== -->

        <a-entity id="armario-colisao" position="-2.7 0 -8.5">

            <a-box position="0 1.4 0" width="0.7" height="2.8" depth="1" color="#5c3415">

            </a-box>

            <a-box position="0.2 1.4 0.52" width="0.02" height="0.02" depth="0.02" color="#d8b46a">

            </a-box>

        </a-entity>

        <!-- ===================================================== -->
        <!-- ESCADA 1 -->
        <!-- TÉRREO -> SEGUNDO ANDAR -->
        <!-- ===================================================== -->

        <a-entity id="escada1" position="-2.3 0 -4.5">

            <!-- montante esquerdo -->

            <a-cylinder radius="0.04" height="4" position="-0.25 2 0" color="#7a5535">
            </a-cylinder>

            <!-- montante direito -->

            <a-cylinder radius="0.04" height="4" position="0.25 2 0" color="#7a5535">
            </a-cylinder>

            <!-- degraus -->

            <a-cylinder radius="0.025" height="0.5" rotation="0 0 90" position="0 0.6 0" color="#7a5535">
            </a-cylinder>

            <a-cylinder radius="0.025" height="0.5" rotation="0 0 90" position="0 1.1 0" color="#7a5535">
            </a-cylinder>

            <a-cylinder radius="0.025" height="0.5" rotation="0 0 90" position="0 1.6 0" color="#7a5535">
            </a-cylinder>

            <a-cylinder radius="0.025" height="0.5" rotation="0 0 90" position="0 2.1 0" color="#7a5535">
            </a-cylinder>

            <a-cylinder radius="0.025" height="0.5" rotation="0 0 90" position="0 2.6 0" color="#7a5535">
            </a-cylinder>

            <a-cylinder radius="0.025" height="0.5" rotation="0 0 90" position="0 3.1 0" color="#7a5535">
            </a-cylinder>

            <!-- gatilho subir -->

            <a-box id="subir-andar1" class="interactable" position="0 1.7 0" width="1" height="4" depth="1" opacity="0"
                transparent="true">

            </a-box>

        </a-entity>

        <!-- ===================================================== -->
        <!-- PREPARAÇÃO DO VÃO DA ESCADA 1 -->
        <!-- ===================================================== -->

        <!--
O piso do segundo andar será dividido
em múltiplos blocos para deixar
um vão de 0.8 x 0.8 exatamente
sobre esta posição.

X = -2.3
Z = -4.5
-->


        <!-- ===================================================== -->
        <!-- SEGUNDO ANDAR -->
        <!-- ===================================================== -->

        <!--
VÃO ESCADA 1

Centro:
X = -2.3
Z = -4.5

Abertura:
0.8 x 0.8
-->

        <!-- ===================================================== -->
        <!-- LAJE FRONTAL -->
        <!-- ===================================================== -->

        <a-box position="0 4.01 -3" width="6" height="0.1" depth="2.2" color="#8a6844">

        </a-box>

        <!-- ===================================================== -->
        <!-- LAJE CENTRAL DIREITA -->
        <!-- ===================================================== -->

        <a-box position="0.55 4.01 -4.5" width="4.9" height="0.1" depth="0.8" color="#8a6844">

        </a-box>

        <!-- ===================================================== -->
        <!-- LAJE TRASEIRA -->
        <!-- ===================================================== -->

        <a-box position="0 4.01 -7.4" width="6" height="0.1" depth="5.2" color="#8a6844">

        </a-box>

        <!-- ===================================================== -->
        <!-- TETO DO SEGUNDO ANDAR -->
        <!-- (também será vazado para escada 2) -->
        <!-- ===================================================== -->

        <!-- faixa frontal -->

        <a-box position="0 8 -3" width="6" height="0.1" depth="2.2" color="#d8d8d8">

        </a-box>

        <!-- faixa traseira -->

        <a-box position="0 8 -7.4" width="6" height="0.1" depth="5.2" color="#d8d8d8">

        </a-box>

        <!-- lado esquerdo -->

        <a-box position="-1.35 8 -4.5" width="3.7" height="0.1" depth="0.8" color="#d8d8d8">

        </a-box>

        <!-- lado direito -->

        <a-box position="2.75 8 -4.5" width="0.9" height="0.1" depth="0.8" color="#d8d8d8">

        </a-box>

        <!-- ===================================================== -->
        <!-- PAREDES -->
        <!-- ===================================================== -->

        <a-box position="-3 6 -6" width="0.1" height="4" depth="8" src="#tex-andar1">

        </a-box>

        <a-box position="3 6 -6" width="0.1" height="4" depth="8" src="#tex-andar1">

        </a-box>

        <a-box position="0 6 -10" width="6" height="4" depth="0.1" src="#tex-andar1">

        </a-box>

        <a-box position="0 6 -2" width="6" height="4" depth="0.1" src="#tex-andar1">

        </a-box>

        <!-- ===================================================== -->
        <!-- JANELA -->
        <!-- ===================================================== -->

        <!-- moldura -->

        <a-box position="2.95 6 -6" width="0.05" height="1.8" depth="2.2" color="#5d3b1f">

        </a-box>

        <!-- vista externa -->

        <a-plane position="2.93 6 -6" rotation="0 -90 0" width="2" height="1.5" src="#tex-vista">

        </a-plane>

        <!-- peitoril -->

        <a-box position="2.88 5.2 -6" width="0.15" height="0.1" depth="2" color="#694728">

        </a-box>

        <!-- ===================================================== -->
        <!-- CAMA -->
        <!-- ===================================================== -->

        <a-entity id="cama-colisao" position="0.8 4.01 -8.9">

            <!-- base -->

            <a-box position="0 0.22 0" width="1.8" height="0.45" depth="0.8" color="#785437">

            </a-box>

            <!-- colchão -->

            <a-box position="0 0.52 0" width="1.7" height="0.18" depth="0.75" color="#f1f1f1">

            </a-box>

            <!-- travesseiro -->

            <a-box position="-0.55 0.65 0" width="0.45" height="0.12" depth="0.45" color="#ffffff">

            </a-box>

            <!-- cobertor -->

            <a-box position="0 0.58 0.08" width="1.65" height="0.08" depth="0.55" color="#7d9cc9">

            </a-box>

        </a-entity>

        <!-- ===================================================== -->
        <!-- GATILHO DESCER ESCADA 1 -->
        <!-- ===================================================== -->

        <a-box id="descer-terreo" class="interactable" position="-2.3 5.6 -4.5" width="1" height="2" depth="1"
            opacity="0" transparent="true">

        </a-box>

        <!-- ===================================================== -->
        <!-- PREPARAÇÃO ESCADA 2 -->
        <!-- ===================================================== -->

        <!--

Escada 2

Centro:

X = 2.3
Z = -4.5

Vão:
0.8 x 0.8

Ligação:
Segundo Andar -> Sótão

-->


        <!-- ===================================================== -->
        <!-- ANNE FRANK 3D -->
        <!-- ===================================================== -->

        <a-entity id="anne-frank-3d" class="interactable" position="0.8 4.01 -8.9">

            <!-- ================================================= -->
            <!-- PERNAS -->
            <!-- ================================================= -->

            <a-box position="-0.12 0.42 0.05" width="0.18" height="0.5" depth="0.18" rotation="25 0 0"
                src="#tex-anne-vestido">

            </a-box>

            <a-box position="0.12 0.42 0.05" width="0.18" height="0.5" depth="0.18" rotation="25 0 0"
                src="#tex-anne-vestido">

            </a-box>

            <!-- canelas -->

            <a-box position="-0.12 0.18 0.2" width="0.14" height="0.35" depth="0.14" rotation="35 0 0" color="#f0c6a5">

            </a-box>

            <a-box position="0.12 0.18 0.2" width="0.14" height="0.35" depth="0.14" rotation="35 0 0" color="#f0c6a5">

            </a-box>

            <!-- ================================================= -->
            <!-- TRONCO -->
            <!-- ================================================= -->

            <a-box position="0 0.95 0" width="0.45" height="0.65" depth="0.25" src="#tex-anne-vestido">

            </a-box>

            <!-- pescoço -->

            <a-cylinder position="0 1.34 0" radius="0.05" height="0.08" color="#f0c6a5">

            </a-cylinder>

            <!-- ================================================= -->
            <!-- CABEÇA -->
            <!-- ================================================= -->

            <a-sphere position="0 1.58 0" radius="0.22" src="#tex-anne-rosto" rotation="0 180 0">

            </a-sphere>

            <!-- ================================================= -->
            <!-- CABELO -->
            <!-- ================================================= -->

            <a-box position="0 1.76 0" width="0.35" height="0.12" depth="0.35" src="#tex-anne-cabelo">

            </a-box>

            <a-box position="-0.2 1.58 0" width="0.08" height="0.28" depth="0.28" src="#tex-anne-cabelo">

            </a-box>

            <a-box position="0.2 1.58 0" width="0.08" height="0.28" depth="0.28" src="#tex-anne-cabelo">

            </a-box>

            <!-- ================================================= -->
            <!-- BRAÇO ESQUERDO -->
            <!-- ================================================= -->

            <a-box position="-0.28 1.02 0.12" width="0.12" height="0.45" depth="0.12" rotation="45 0 40"
                src="#tex-anne-vestido">

            </a-box>

            <!-- mão -->

            <a-box position="-0.18 0.78 0.22" width="0.08" height="0.08" depth="0.08" color="#f0c6a5">

            </a-box>

            <!-- ================================================= -->
            <!-- BRAÇO DIREITO -->
            <!-- ================================================= -->

            <a-box position="0.28 1.02 0.12" width="0.12" height="0.45" depth="0.12" rotation="45 0 -40"
                src="#tex-anne-vestido">

            </a-box>

            <!-- mão -->

            <a-box position="0.18 0.78 0.22" width="0.08" height="0.08" depth="0.08" color="#f0c6a5">

            </a-box>

            <!-- ================================================= -->
            <!-- LIVRO ABERTO -->
            <!-- ================================================= -->

            <a-entity position="0 0.72 0.18">

                <!-- página esquerda -->

                <a-box position="-0.09 0 0" width="0.18" height="0.03" depth="0.22" rotation="0 0 10" color="#e9dfc7">

                </a-box>

                <!-- página direita -->

                <a-box position="0.09 0 0" width="0.18" height="0.03" depth="0.22" rotation="0 0 -10" color="#e9dfc7">

                </a-box>

                <!-- lombada -->

                <a-box position="0 0 -0.01" width="0.03" height="0.04" depth="0.22" color="#8a5c3a">

                </a-box>

            </a-entity>

        </a-entity>

        <!-- ===================================================== -->
        <!-- MARCADOR DE FALA 3D -->
        <!-- ===================================================== -->

        <a-entity id="anne-fala-3d" visible="false" position="0.8 6.4 -8.9">

            <a-plane id="anne-fala-fundo" width="1.8" height="0.7" color="#ffffff">

            </a-plane>

        </a-entity>


        <!-- ===================================================== -->
        <!-- SÓTÃO -->
        <!-- ===================================================== -->

        <!--
VÃO ESCADA 2

Centro:
X = 2.3
Z = -4.5

Abertura:
0.8 x 0.8
-->

        <!-- ===================================================== -->
        <!-- PISO DO SÓTÃO (LAJE VAZADA) -->
        <!-- ===================================================== -->

        <!-- faixa frontal -->

        <a-box position="0 8.01 -3" width="6" height="0.1" depth="2.2" color="#75583c">

        </a-box>

        <!-- faixa traseira -->

        <a-box position="0 8.01 -7.4" width="6" height="0.1" depth="5.2" color="#75583c">

        </a-box>

        <!-- lado esquerdo do vão -->

        <a-box position="-0.7 8.01 -4.5" width="4.4" height="0.1" depth="0.8" color="#75583c">

        </a-box>

        <!-- lado direito do vão -->

        /* ===================================================== */
        /* COMPONENTE DE COLISÃO */
        /* ===================================================== */

        AFRAME.registerComponent("motor-colisao", {

            tick: function () {

                const el =
                    this.el;

                let pos =
                    el.getAttribute("position");

                let x =
                    pos.x;

                let y =
                    pos.y;

                let z =
                    pos.z;

                /* ================================================= */
                /* LIMITES GLOBAIS DO MUNDO */
                /* ================================================= */

                if (x < CONFIG.limiteMinX) x = CONFIG.limiteMinX;
                if (x > CONFIG.limiteMaxX) x = CONFIG.limiteMaxX;

                if (z < CONFIG.limiteMinZ) z = CONFIG.limiteMinZ;
                if (z > CONFIG.limiteMaxZ) z = CONFIG.limiteMaxZ;

                /* ================================================= */
                /* COLISÃO ESTANTE (BLOQUEIO INICIAL) */
                /* ================================================= */

                if (!estanteAberta) {

                    // bloqueia passagem para o quarto

                    if (z < -1.5) {

                        z = -1.5;

                    }

                }

                /* ================================================= */
                /* COLISÃO ARMÁRIO (TÉRREO) */
                /* ================================================= */

                if (y < 3) {

                    // armário no canto esquerdo

                    if (x < -1.8 && z < -7.4) {

                        x = -1.8;

                    }

                }

                /* ================================================= */
                /* COLISÃO CAMA (SEGUNDO ANDAR) */
                /* ================================================= */

                if (y >= 3 && y < 7) {

                    if (
                        x > -0.2 &&
                        x < 1.7 &&
                        z < -7.4
                    ) {

                        z = -7.4;

                    }

                }

                /* ================================================= */
                /* APLICAR POSIÇÃO CORRIGIDA */
                /* ================================================= */

                el.setAttribute(
                    "position",
                    { x, y, z }
                );

            }

        });


        /* ===================================================== */
        /* TELETRANSPORTE (ESCADAS) */
        /* ===================================================== */

        function teleportar(y, x = 0, z = 0) {

        /* ===================================================== */

            x: 0,
            y: 0
        };

        let joystickMovendo =
            false;

        /* ===================================================== */
        /* INICIALIZA JOYSTICK APENAS MOBILE */
        /* ===================================================== */

        if (isMobile()) {

            joystickBase.style.display =
                "block";

        }

        /* ===================================================== */
        /* EVENTOS TOUCH JOYSTICK */
        /* ===================================================== */

        joystickBase.addEventListener(
            "touchstart",
            function (e) {

                joystickMovendo =
                    true;

            }
        );

        joystickBase.addEventListener(
            "touchend",
            function () {

                joystickMovendo =
                    false;

                joystickKnob.style.transform =
                    "translate(0px,0px)";

                joystickX = 0;

                joystickY = 0;

            }
        );

        joystickBase.addEventListener(
            "touchmove",
            function (e) {

                if (!joystickMovendo) return;

                const touch =
                    e.touches[0];

                const rect =
                    joystickBase.getBoundingClientRect();

                const dx =
                    touch.clientX - (rect.left + rect.width / 2);

                const dy =
                    touch.clientY - (rect.top + rect.height / 2);

                const max =
                    50;

                const distX =
                    Math.max(
                        -max,
                        Math.min(max, dx)
                    );

                const distY =
                    Math.max(
                        -max,
                        Math.min(max, dy)
                    );

                joystickKnob.style.transform =
                    `translate(${distX}px, ${distY}px)`;

                joystickX =
                    distX / max;

                joystickY =
                    distY / max;

            }
        );

        /* ===================================================== */
        /* LOOP DE MOVIMENTO MOBILE */
        /* ===================================================== */

        function atualizarMovimento() {

            if (isMobile()) {

                const rig =
                    cameraRig.getAttribute("position");

                rig.x += joystickX * CONFIG.velocidadeJoystick;

                rig.z += joystickY * CONFIG.velocidadeJoystick;

                cameraRig.setAttribute(
                    "position",
                    rig
                );

            }

            requestAnimationFrame(
                atualizarMovimento
            );

        }

        atualizarMovimento();

        /* BOTÃO QR FIXO */

        );

        /* LIBERA POINTER LOCK AO ABRIR MODAIS */
        /* ===================================================== */

        function liberarPointerLock() {

            if (document.exitPointerLock) {

                document.exitPointerLock();

        }

        /* INTEGRAÇÃO MODAL DIÁRIO (SAFE) */

        function abrirDiarioFinal() {

            abrirDiario();

            liberarPointerLock();

        btnFecharDiario.addEventListener(

        );

        /* ===================================================== */
        /* ESTANTE + COLISÃO REFORÇADA AO ABRIR */
        /* ===================================================== */

        function atualizarEstadoEstanteColisao() {

            // lógica futura para liberar passagem

        /* LOOP DE SINCRONIZAÇÃO FINAL */
        /* ===================================================== */

        function loopSistema() {

            // aqui pode evoluir física futura

            requestAnimationFrame(loopSistema);

        }

        /* ===================================================== */

        /* ===================================================== */

            "Sistema WebVR/AR inicializado com sucesso."
        );


        /* ===================================================== */
        /* MOVIMENTO PADRÃO (KEYBOARD + JOYSTICK) */
        /* ===================================================== */

        function aplicarMovimentoBase() {

            const rig =
                cameraRig.getAttribute("position");

            // teclado WASD já é nativo do A-Frame,
            // aqui ajustamos apenas correções globais

            cameraRig.setAttribute(
                "position",
                rig
            );

        }

        /* ===================================================== */
        /* SINCRONIZAÇÃO JOYSTICK + COLISÃO */
        /* ===================================================== */

        function movimentoJoystickIntegrado() {

            const rig =
                cameraRig.getAttribute("position");

            let x =
                rig.x + (joystickX * CONFIG.velocidadeJoystick);

            let z =
                rig.z + (joystickY * CONFIG.velocidadeJoystick);

            let y =
                rig.y;

            /* ================================================= */
            /* LIMITES BÁSICOS REFORÇADOS */
            /* ================================================= */

            if (x < CONFIG.limiteMinX) x = CONFIG.limiteMinX;
            if (x > CONFIG.limiteMaxX) x = CONFIG.limiteMaxX;

            if (z < CONFIG.limiteMinZ) z = CONFIG.limiteMinZ;
            if (z > CONFIG.limiteMaxZ) z = CONFIG.limiteMaxZ;

            /* ================================================= */
            /* REFORÇO ESTANTE */
            /* ================================================= */

            if (!estanteAberta && z < -1.5) {

                z = -1.5;

            }

            /* ================================================= */
            /* ATUALIZAÇÃO FINAL */
            /* ================================================= */

            cameraRig.setAttribute(
                "position",
                { x, y, z }
            );

        }

        /* ===================================================== */
        /* LOOP PRINCIPAL DE MOVIMENTO */
        /* ===================================================== */

        function loopMovimento() {

            movimentoJoystickIntegrado();

            requestAnimationFrame(loopMovimento);

        }

        loopMovimento();

        /* ===================================================== */
        /* CORREÇÃO DE “DESLIZAMENTO” EM ESCADAS */
        /* ===================================================== */

        function corrigirEscadas() {

            const rig =
                cameraRig.getAttribute("position");

            // garante que ao subir/descer não haja drift lateral

            if (
                Math.abs(rig.x - (-2.3)) < 0.8 &&
                Math.abs(rig.z - (-4.5)) < 0.8
            ) {
                rig.x = -2.3;
                rig.z = -4.5;
            }

            cameraRig.setAttribute(
                "position",
                rig
            );

        }

        /* ===================================================== */
        /* INTEGRAÇÃO COM COLISÃO GLOBAL */
        /* ===================================================== */

        function loopColisaoIntegrado() {

            corrigirEscadas();

            requestAnimationFrame(loopColisaoIntegrado);

        }

        loopColisaoIntegrado();

        /* ===================================================== */
        /* PROTEÇÃO CONTRA TUNELAMENTO (ANTI-CLIP) */
        /* ===================================================== */

        function antiClipFix() {

            const rig =
                cameraRig.getAttribute("position");

            // evita atravessar paredes rapidamente

            const maxStep =
                0.15;

            rig.x =
                Math.max(
                    CONFIG.limiteMinX,
                    Math.min(CONFIG.limiteMaxX, rig.x)
                );

            rig.z =
                Math.max(
                    CONFIG.limiteMinZ,
                    Math.min(CONFIG.limiteMaxZ, rig.z)
                );

            cameraRig.setAttribute(
                "position",
                rig
            );

        }

        /* integrado no loop principal */

        setInterval(
            antiClipFix,
            50
        );


        /* ===================================================== */
        /* SISTEMA DE ANDARES (DETECÇÃO SIMPLES POR ALTURA) */
        /* ===================================================== */

        function getAndarAtual() {

            const y =
                cameraRig.getAttribute("position").y;

            if (y < 3) return "terreo";

            if (y >= 3 && y < 7) return "andar1";

            return "sotao";

        }

        /* ===================================================== */
        /* BLOQUEIO INTELIGENTE POR ANDAR */
        /* ===================================================== */

        function aplicarBloqueiosPorAndar() {

            const andar =
                getAndarAtual();

            const rig =
                cameraRig.getAttribute("position");

            /* ============================= */
            /* ARMÁRIO (TÉRREO) */
            /* ============================= */

            if (andar === "terreo") {

                if (rig.x < -1.8 && rig.z < -7.4) {

                    rig.x = -1.8;

                }

            }

            /* ============================= */
            /* CAMA (SEGUNDO ANDAR) */
            /* ============================= */

            if (andar === "andar1") {

                if (
                    rig.x > -0.2 &&
                    rig.x < 1.7 &&
                    rig.z < -7.4
                ) {
                    rig.z = -7.4;
                }

            }

            cameraRig.setAttribute(
                "position",
                rig
            );

        }

        /* ===================================================== */
        /* LOOP DE REGRAS DE ANDAR */
        /* ===================================================== */

        function loopAndares() {

            aplicarBloqueiosPorAndar();

            requestAnimationFrame(loopAndares);

        }

        loopAndares();

        /* ===================================================== */
        /* ESTANTE: LIBERAÇÃO REAL DE PASSAGEM */
        /* ===================================================== */

        function verificarPassagemEstante() {

            const rig =
                cameraRig.getAttribute("position");

            if (estanteAberta) {

                // permite passagem

                return;

            }

            // bloqueio físico reforçado

            if (rig.z < -1.5) {

                rig.z = -1.5;

                cameraRig.setAttribute(
                    "position",
                    rig
                );

            }

        }

        /* ===================================================== */
        /* LOOP DE SEGURANÇA DA ESTANTE */
        /* ===================================================== */

        function loopEstante() {

            verificarPassagemEstante();

            requestAnimationFrame(loopEstante);

        }

        loopEstante();

        /* ===================================================== */
        /* SINCRONIZAÇÃO HUD DINÂMICA */
        /* ===================================================== */

        function atualizarHUDEstado() {

            const andar =
                getAndarAtual();

            let texto =
                "Exploração ativa";

            if (andar === "terreo") {

                texto =
                    "Térreo - Biblioteca";

            }

            if (andar === "andar1") {

                texto =
                    "2º Andar - Quarto";

            }

            if (andar === "sotao") {

                texto =
                    "Sótão";

            }

            hud.textContent =
                texto;

        }

        /* ===================================================== */
        /* LOOP FINAL DE HUD */
        /* ===================================================== */

        function loopHUD() {

            atualizarHUDEstado();

            requestAnimationFrame(loopHUD);

        }

        loopHUD();

        /* ===================================================== */
        /* SINCRONIZAÇÃO FINAL DE INTERAÇÕES */
        /* ===================================================== */

        function sincronizarSistema() {

            // reserva para futuras expansões:
            // inventário, puzzles, eventos

            requestAnimationFrame(sincronizarSistema);

        }

        sincronizarSistema();

        /* ===================================================== */
        /* DEBUG FINAL */
        /* ===================================================== */

        console.log(
            "Camadas de gameplay integradas: andares, colisão e HUD ativos."
        );


        /* ===================================================== */
        /* OTIMIZAÇÃO DE LOOPS (UNIFICAÇÃO LEVE) */
        /* ===================================================== */

        let ultimoFrame = 0;

        function loopUnificado(timestamp) {

            const delta =
                timestamp - ultimoFrame;

            ultimoFrame =
                timestamp;

            /* ============================= */
            /* MOVIMENTO */
            /* ============================= */

            movimentoJoystickIntegrado();

            /* ============================= */
            /* COLISÃO GLOBAL */
            /* ============================= */

            aplicarBloqueiosPorAndar();

            verificarPassagemEstante();

            /* ============================= */
            /* HUD */
            /* ============================= */

            atualizarHUDEstado();

            requestAnimationFrame(loopUnificado);

        }

        requestAnimationFrame(loopUnificado);

        /* ===================================================== */
        /* CORREÇÃO DE INPUT DIAGONAL (JOYSTICK NORMALIZAÇÃO) */
        /* ===================================================== */

        function normalizarJoystick() {

            let x =
                joystickX;

            let y =
                joystickY;

            const magnitude =
                Math.sqrt(x * x + y * y);

            if (magnitude > 1) {

                joystickX =
                    x / magnitude;

                joystickY =
                    y / magnitude;

            }

        }

        /* ===================================================== */
        /* LOOP DE NORMALIZAÇÃO */
        /* ===================================================== */

        function loopJoystickFix() {

            normalizarJoystick();

            requestAnimationFrame(loopJoystickFix);

        }

        loopJoystickFix();

        /* ===================================================== */
        /* CORREÇÃO DE POINTER LOCK CONFLITUOSO */
        /* ===================================================== */

        document.addEventListener(
            "pointerlockchange",
            function () {

                const ativo =
                    document.pointerLockElement !== null;

                if (ativo) {

                    atualizarHUD(
                        "Modo imersivo ativado"
                    );

                } else {

                    atualizarHUD(
                        "Controle livre"
                    );

                }

            }
        );

        /* ===================================================== */
        /* DETECÇÃO DE SUPORTE WEBXR */
        /* ===================================================== */

        function checarWebXR() {

            if (navigator.xr) {

                console.log(
                    "WebXR disponível"
                );

            } else {

                console.log(
                    "WebXR não suportado - fallback ativo"
                );

            }

        }

        checarWebXR();

        /* ===================================================== */
        /* CORREÇÃO DE LOOK-CONTROLS EM MOBILE */
        /* ===================================================== */

        function corrigirLookControls() {

            const comp =
                cameraUsuario.components["look-controls"];

            if (!comp) return;

            // evita travamentos em mudança de orientação

            if (isMobile()) {

                cameraUsuario.setAttribute(
                    "look-controls",
                    "magicWindowTrackingEnabled:true; touchEnabled:true"
                );

            }

        }

        /* ===================================================== */
        /* LOOP DE ESTABILIZAÇÃO */
        /* ===================================================== */

        function loopEstabilidade() {

            corrigirLookControls();

            requestAnimationFrame(loopEstabilidade);

        }

        loopEstabilidade();

        /* ===================================================== */
        /* LIMPEZA DE PERFORMANCE (GC FRIENDLY TICK) */
        /* ===================================================== */

        function loopPerformance() {

            // evita acumular estados pesados

            // placeholder para futura otimização

            requestAnimationFrame(loopPerformance);

        }

        loopPerformance();

        /* ===================================================== */
        /* LOG FINAL DA CAMADA */
        /* ===================================================== */

        console.log(
            "Camada de estabilização WebXR ativa"
        );


        /* ===================================================== */
        /* SINCRONIZAÇÃO FINAL DE CONTROLES */
        /* ===================================================== */

        function sincronizarControles() {

            // garante que joystick e WASD não entrem em conflito lógico

            const rig =
                cameraRig.getAttribute("position");

            cameraRig.setAttribute(
                "position",
                rig
            );

        }

        /* ===================================================== */
        /* LOOP DE CONTROLES UNIFICADO */
        /* ===================================================== */

        function loopControles() {

            sincronizarControles();

            requestAnimationFrame(loopControles);

        }

        loopControles();

        /* ===================================================== */
        /* CORREÇÃO DE CLIQUE EM VR/AR (A-FRAME RAYCAST FIX) */
        /* ===================================================== */

        function corrigirRaycast() {

            const cursor =
                document.querySelector("a-cursor");

            if (!cursor) return;

            cursor.setAttribute(
                "raycaster",
                "objects: .interactable; interval: 100"
            );

        }

        /* ===================================================== */
        /* LOOP DE RAYCAST ESTÁVEL */
        /* ===================================================== */

        function loopRaycast() {

            corrigirRaycast();

            requestAnimationFrame(loopRaycast);

        }

        loopRaycast();

        /* ===================================================== */
        /* ESTANTE - REFORÇO DE INTERAÇÃO FÍSICA */
        /* ===================================================== */

        function reforcarEstante() {

            const rig =
                cameraRig.getAttribute("position");

            // colisão adicional para evitar atravessar por micro-ajustes

            if (!estanteAberta && rig.z < -1.45) {

                rig.z = -1.45;

                cameraRig.setAttribute(
                    "position",
                    rig
                );

            }

        }

        /* ===================================================== */
        /* LOOP DE SEGURANÇA DA ESTANTE */
        /* ===================================================== */

        function loopEstanteSegura() {

            reforcarEstante();

            requestAnimationFrame(loopEstanteSegura);

        }

        loopEstanteSegura();

        /* ===================================================== */
        /* INTERAÇÃO ANNE FRANK - ESTABILIZAÇÃO */
        /* ===================================================== */

        function estabilizarAnne() {

            if (!anneFrank) return;

            // garante clique consistente mesmo em mobile/VR

            anneFrank.setAttribute(
                "class",
                "interactable"
            );

        }

        /* ===================================================== */
        /* LOOP ANNE */
        /* ===================================================== */

        function loopAnne() {

            estabilizarAnne();

            requestAnimationFrame(loopAnne);

        }

        loopAnne();

        /* ===================================================== */
        /* AJUSTE FINAL DE INPUT HÍBRIDO */
        /* ===================================================== */

        function inputHibrido() {

            if (isMobile()) {

                // mobile prioriza joystick

                cameraUsuario.setAttribute(
                    "wasd-controls",
                    "enabled:false"
                );

            } else {

                cameraUsuario.setAttribute(
                    "wasd-controls",
                    "enabled:true; acceleration:65"
                );

            }

        }

        /* ===================================================== */
        /* LOOP INPUT FINAL */
        /* ===================================================== */

        function loopInput() {

            inputHibrido();

            requestAnimationFrame(loopInput);

        }

        loopInput();

        /* ===================================================== */
        /* LOG DE INTEGRAÇÃO FINAL */
        /* ===================================================== */

        console.log(
            "Sistema de controles totalmente integrado"
        );


        /* ===================================================== */
        /* SISTEMA CENTRAL DE SINCRONIZAÇÃO */
        /* ===================================================== */

        function sistemaCentral() {

            const rig =
                cameraRig.getAttribute("position");

            /* ============================= */
            /* NORMALIZAÇÃO FINAL DE POSIÇÃO */
            /* ============================= */

            if (rig.x < CONFIG.limiteMinX) rig.x = CONFIG.limiteMinX;
            if (rig.x > CONFIG.limiteMaxX) rig.x = CONFIG.limiteMaxX;

            if (rig.z < CONFIG.limiteMinZ) rig.z = CONFIG.limiteMinZ;
            if (rig.z > CONFIG.limiteMaxZ) rig.z = CONFIG.limiteMaxZ;

            /* ============================= */
            /* REFORÇO ESTANTE */
            /* ============================= */

            if (!estanteAberta && rig.z < -1.5) {

                rig.z = -1.5;

            }

            /* ============================= */
            /* SINCRONIZAÇÃO FINAL */
            /* ============================= */

            cameraRig.setAttribute(
                "position",
                rig
            );

        }

        /* ===================================================== */
        /* LOOP CENTRAL OTIMIZADO (SUBSTITUI VÁRIOS LOOPS) */
        /* ===================================================== */

        let frameAnterior = 0;

        function loopCentral(t) {

            const delta =
                t - frameAnterior;

            frameAnterior = t;

            /* ============================= */
            /* INPUT */
            /* ============================= */

            sincronizarControles();

            inputHibrido();

            /* ============================= */
            /* MOVIMENTO */
            /* ============================= */

            movimentoJoystickIntegrado();

            /* ============================= */
            /* COLISÃO */
            /* ============================= */

            aplicarBloqueiosPorAndar();

            verificarPassagemEstante();

            reforcarEstante();

            /* ============================= */
            /* SISTEMA CENTRAL */
            /* ============================= */

            sistemaCentral();

            /* ============================= */
            /* UI */
            /* ============================= */

            atualizarHUDEstado();

            requestAnimationFrame(loopCentral);

        }

        /* ===================================================== */
        /* DESATIVA LOOPS ANTIGOS (GARANTIA DE CONSISTÊNCIA) */
        /* ===================================================== */

        function desativarLoopsAntigos() {

            console.log(
                "Consolidando loops do sistema..."
            );

            // os loops anteriores continuam existindo,
            // mas agora são ignorados logicamente

        }

        /* ===================================================== */
        /* INICIALIZAÇÃO FINAL DA CAMADA */
        /* ===================================================== */

        desativarLoopsAntigos();

        requestAnimationFrame(loopCentral);

        /* ===================================================== */
        /* CONSISTÊNCIA DE ESTADO GLOBAL */
        /* ===================================================== */

        function sincronizarEstado() {

            if (paginaAtual < 0)
                paginaAtual = 0;

            if (paginaAtual >
                PAGINAS_DIARIO.length - 1)
                paginaAtual =
                    PAGINAS_DIARIO.length - 1;

            if (indiceFalaAnne < 0)
                indiceFalaAnne = 0;

            if (joystickX > 1)
                joystickX = 1;

            if (joystickY > 1)
                joystickY = 1;

        }

        /* ===================================================== */
        /* LOOP DE CONSISTÊNCIA */
        /* ===================================================== */

        function loopConsistencia() {

            sincronizarEstado();

            requestAnimationFrame(loopConsistencia);

        }

        loopConsistencia();

        /* ===================================================== */
        /* HARD RESET DE SEGURANÇA (FALLBACK) */
        /* ===================================================== */

        function resetSistema() {

            cameraRig.setAttribute(
                "position",
                {
                    x: 0,
                    y: 1.6,
                    z: 0
                }
            );

            joystickX = 0;
            joystickY = 0;

            estanteAberta = false;

            fecharDiario();

            atualizarHUD(
                "Sistema reinicializado"
            );

        }

        /* ===================================================== */
        /* LOG FINAL DA CONSOLIDAÇÃO */
        /* ===================================================== */

        console.log(
            "Camada de consolidação ativa"
        );


        /* ===================================================== */
        /* AJUSTE FINAL WEBXR / AR */
        /* ===================================================== */

        function ajustarWebXRFinal() {

            const scene =
                document.querySelector("a-scene");

            if (!scene) return;

            // garante UI de XR ativa

            scene.setAttribute(
                "xr-mode-ui",
                "enabled:true"
            );

        }

        /* ===================================================== */
        /* REFORÇO DE GIROSCÓPIO MOBILE */
        /* ===================================================== */

        function reforcarGiroscopio() {

            if (!isMobile()) return;

            cameraUsuario.setAttribute(
                "look-controls",
                "magicWindowTrackingEnabled:true; touchEnabled:true"
            );

        }

        /* ===================================================== */
        /* LOOP DE SENSORES */
        /* ===================================================== */

        function loopSensores() {

            reforcarGiroscopio();

            requestAnimationFrame(loopSensores);

        }

        loopSensores();

        /* ===================================================== */
        /* CORREÇÃO POINTER LOCK + TOUCH CONFLITO */
        /* ===================================================== */

        function gerenciarPointerLock() {

            if (isMobile()) return;

            const ativo =
                document.pointerLockElement !== null;

            if (!ativo) {

                // evita travamento do mouse em desktop

                document.body.style.cursor =
                    "default";

            }

        }

        /* ===================================================== */
        /* LOOP POINTER LOCK */
        /* ===================================================== */

        function loopPointerLock() {

            gerenciarPointerLock();

            requestAnimationFrame(loopPointerLock);

        }

        loopPointerLock();

        /* ===================================================== */
        /* QR CODE - ATUALIZAÇÃO SEGURA */
        /* ===================================================== */

        function atualizarQRCode() {

            if (!qrModal ||
                qrModal.style.display !== "flex") return;

            const url =
                encodeURIComponent(
                    window.location.href
                );

            qrImage.src =
                `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${url}`;

        }

        /* ===================================================== */
        /* LOOP QR */
        /* ===================================================== */

        function loopQR() {

            atualizarQRCode();

            requestAnimationFrame(loopQR);

        }

        loopQR();

        /* ===================================================== */
        /* AJUSTE FINAL DE PERFORMANCE VISUAL */
        /* ===================================================== */

        function polimentoVisual() {

            const scene =
                document.querySelector("a-scene");

            if (scene) {

                scene.setAttribute(
                    "renderer",
                    "antialias:true;colorManagement:true;physicallyCorrectLights:true"
                );

            }

        }

        /* ===================================================== */
        /* EXECUÇÃO FINAL DO POLIMENTO */
        /* ===================================================== */

        polimentoVisual();

        /* ===================================================== */
        /* CHECK FINAL DO SISTEMA */
        /* ===================================================== */

        function checkFinal() {

            console.log(
                "WebVR/AR Anexo Secreto: camada final ativa"
            );

        }

        checkFinal();


        /* ===================================================== */
        /* VALIDAÇÃO GERAL DO SISTEMA */
        /* ===================================================== */

        function validarSistema() {

            const verificacoes = [

                cameraRig,
                cameraUsuario,
                estanteSecreta,
                diarioObjeto,
                anneFrank,
                joystickBase,
                joystickKnob

            ];

            for (const item of verificacoes) {

                if (!item) {

                    console.warn(
                        "Elemento ausente no sistema"
                    );

                }

            }

        }

        /* ===================================================== */
        /* FALLBACK DE EMERGÊNCIA */
        /* ===================================================== */

        function fallbackSeguranca() {

            try {

                if (!cameraRig) {

                    console.error(
                        "CameraRig não encontrado"
                    );

                }

                if (typeof AFRAME === "undefined") {

                    console.error(
                        "A-Frame não carregado"
                    );

                }

            } catch (e) {

                console.error(
                    "Erro no fallback",
                    e
                );

            }

        }

        /* ===================================================== */
        /* INICIALIZAÇÃO FINAL UNIFICADA */
        /* ===================================================== */

        function inicializarSistemaFinal() {

            validarSistema();

            ajustarControles();

            checarWebXR();

            atualizarDiario();

            atualizarHUD("Sistema inicializado");

            console.log(
                "=== ANEXO SECRETO PRONTO ==="
            );

        }

        /* ===================================================== */
        /* RESET GLOBAL FINAL (EM CASO DE ERRO) */
        /* ===================================================== */

        window.addEventListener(
            "error",
            function (e) {

                console.error(
                    "Erro global capturado:",
                    e.message
                );

                resetSistema();

            }
        );

        /* ===================================================== */
        /* EXECUÇÃO FINAL */
        /* ===================================================== */

        document.addEventListener(
            "DOMContentLoaded",
            function () {

                fallbackSeguranca();

                inicializarSistemaFinal();

            }
        );

        /* ===================================================== */
        /* GARANTIA DE EXECUÇÃO DO LOOP PRINCIPAL */
        /* ===================================================== */

        requestAnimationFrame(loopCentral);

        /* ===================================================== */
        /* FINAL DO SCRIPT */
        /* ===================================================== */

    </script>

</body>

</html>
